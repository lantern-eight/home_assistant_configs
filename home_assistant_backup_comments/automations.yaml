# File that has some better formatting and comments around the automations. Not all
# automations are included in this file. Just ones that are more complex or have
# special logic.

# ----------------------
# 3D Print Failure Alert
# ----------------------
alias: 3D Print Failure Alert
mode: parallel
triggers:
  - entity_id:
      - sensor.centauri_carbon_print_error
      - sensor.centauri_carbon_2_print_error
      - sensor.centauri_carbon_error_status_reason
      - sensor.centauri_carbon_2_error_status_reason
    trigger: state
conditions:
  - condition: template
    value_template: >
      {{ trigger.to_state.state not in ['none', 'ok', 'unknown', 'unavailable'] }}
actions:
  # 1. Variables to clean up the entity ID and build the notification pieces
  - variables:
      # This regex_replace handles both suffix types at once to find the printer name
      base_name: >
        {{ trigger.entity_id 
          | replace('sensor.', '') 
          | replace('_print_error', '') 
          | replace('_error_status_reason', '') }}
      
      notif_title: "{{ base_name | replace('_', ' ') | title }} — Print Error ❌"
      
      notif_message: >
        File: {{ states('input_text.' ~ base_name ~ '_last_file')
            | replace('_',' ')
            | replace('.gcode','')
            | default('Unknown file', true) }}
        🚨 Error: {{ trigger.to_state.state | replace('_',' ') | title }}
      
      notif_image: >
        /api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp() }}

  # 2. Notify
  - data:
      title: "{{ notif_title }}"
      message: "{{ notif_message }}"
      data:
        image: "{{ notif_image }}"
    action: notify.boss_phones

  # 3. Reset the halfway notification boolean so the next print works correctly
  - target:
      entity_id: "input_boolean.{{ base_name }}_half_notified"
    action: input_boolean.turn_off


# ----------------------
# 3D Print Complete Notification
# ----------------------
alias: 3D Print Complete Notification
mode: parallel
triggers:
  - entity_id:
      - sensor.centauri_carbon_print_status
      - sensor.centauri_carbon_2_print_status
    to: complete
    trigger: state
actions:
  # 1. Define variables
  - variables:
      base_name: >
        {{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_print_status', '')
        }}
      notif_title: "{{ base_name | replace('_',' ') | title }} Print Done 👍"
      notif_message: >
        Printed: {{ states('input_text.' ~ base_name ~ '_last_file')
            | replace('_',' ')
            | replace('.gcode','')
            | default('Unknown file', true) }}
      notif_image: >
        /api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp() }}

  # 2. Notify the Group
  - data:
      title: "{{ notif_title }}"
      message: "{{ notif_message }}"
      data:
        image: "{{ notif_image }}"
    action: notify.boss_phones


# ----------------------
# 3D Print Halfway Notification
# ----------------------
alias: 3D Print Halfway Notification
mode: parallel
triggers:
  - entity_id:
      - sensor.centauri_carbon_percent_complete
      - sensor.centauri_carbon_2_percent_complete
    # Any percent update runs the automation; conditions below implement the real
    # trigger.
    trigger: state
conditions:
  # Fire once per job: upward edge across 50% (not the whole 49–57 band) and latch still
  # off.
  - condition: template
    value_template: |
      {# Percent before/after this update; missing from_state treated as 0 (cold start). #}
      {% set previous = (trigger.from_state.state if trigger.from_state else 0) | float(0) %}
      {% set current = trigger.to_state.state | float(0) %}
      {# e.g. input_boolean.centauri_carbon_2_half_notified — must be off or we already notified. #}
      {% set half_notified_entity_id = 'input_boolean.' ~ (trigger.entity_id
          | replace('sensor.', '')
          | replace('_percent_complete', '_half_notified')) %}
      {{ previous < 50 and current >= 50 and states(half_notified_entity_id) == 'off' }}
actions:
  # 1. Define variables first so we don't have to copy-paste the logic
  - variables:
      # Clean up the entity ID to get the base name (e.g., centauri_carbon)
      base_name: >
        {{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_percent_complete', '')
        }}
      
      # Generate the Title
      notif_title: "{{ base_name | replace('_',' ') | title }} — Half done printing! 🕓"
      
      # Generate the Message
      # Lists actual end time in local time, and amount of time remaining.
      notif_message: >
        {% set remaining = states('sensor.' ~ base_name ~ '_remaining_print_time') | int(0) %}
        {% set end_time = now() + timedelta(minutes=remaining) %}
        File: {{ states('input_text.' ~ base_name ~ '_last_file')
            | replace('_',' ')
            | replace('.gcode','')
            | default('Unknown file', true) }}
        ⏳ End Time: {{ end_time.strftime('%-I:%M %p') }}, in {{
          (states('sensor.' ~ base_name ~ '_remaining_print_time')) | int // 60
        }} hours {{
          (states('sensor.' ~ base_name ~ '_remaining_print_time')) | int % 60
        }} minutes

      # Generate the Image URL
      notif_image: >
        /api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp() }}

  # 2. Turn on the boolean (prevents duplicate notifications)
  - target:
      entity_id: "input_boolean.{{ base_name }}_half_notified"
    action: input_boolean.turn_on

  # Notify
  - data:
      title: "{{ notif_title }}"
      message: "{{ notif_message }}"
      data:
        image: "{{ notif_image }}"
    action: notify.boss_phones


# ----------------------
# Door Opens After Bedtime (multi-door)
# ----------------------
# Fires when ANY tracked bedroom door opens during the bedtime window
# (19:45–23:59). Kills TV and media player, turns the bedroom LIFX lights to a
# per-door color so you can tell at a glance which kid is up, and notifies
# the parent phones with the offender's name.
#
# State preservation: On the FIRST door open (all other tracked doors still
# closed), snapshots the current LIFX state into scene.house_state_pre_door_disruption.
# The close automation restores from this scene when all doors are closed
# again, so the room returns to whatever state it was in before the interruption.
#
# To wire up a new door later:
#   1. Add its binary_sensor entity_id to triggers[0].entity_id AND to the
#      all_doors variable in the actions below (keep these two in sync).
#   2. Add a matching key (the base_name — i.e. with the possessive trailing
#      's' stripped) to door_colors with rgb + brightness_pct values.
alias: Door Opens After Bedtime
mode: parallel
triggers:
  - entity_id:
      - binary_sensor.<entity_3>s_door_door
      - binary_sensor.<entity_4>s_door_door
    from: "off"
    to: "on"
    trigger: state
conditions:
  - condition: time
    after: "19:45:00"
    before: "23:59:00"
    # Every day of the week — bedtime is bedtime.
    weekday: [mon, tue, wed, thu, fri, sat, sun]
actions:
  # 1. Derive per-door identity + LIFX color from the trigger entity.
  - variables:
      # Full list of tracked door sensors. Must stay in sync with
      # triggers[0].entity_id above. Used by the "first door?" template below
      # and referenced by the close automation's "all closed?" check.
      all_doors:
        - binary_sensor.<entity_3>s_door_door
        - binary_sensor.<entity_4>s_door_door

      # binary_sensor.<entity_3>s_door_door -> <entity_3>
      # binary_sensor.<entity_4>s_door_door -> <entity_4>
      # Strip prefix, strip '_door_door' suffix, the result matches the door_colors keys
      # below.
      base_name: >
        {{ trigger.entity_id
          | replace('binary_sensor.', '')
          | replace('s_door_door', '') }}

      # Drops into the phone notification so you know which door opened without looking
      # at the LIFX color.
      display_name: "{{ base_name | replace('_',' ') | title }}"

      # Per-door LIFX color: the room color tells you WHICH kid is up without
      # having to unlock your phone. Add a new key whenever a new door is
      # added to the triggers list above.
      # IMPORTANT: keys must be lowercase — HA entity IDs are always
      # lowercase, so base_name will be lowercase.
      door_colors:
        <entity_3>:
          rgb: [255, 0, 0]        # red
          brightness_pct: 15
        <entity_4>:
          rgb: [128, 0, 128]      # purple
          brightness_pct: 15

      lifx_rgb: "{{ door_colors[base_name].rgb }}"
      lifx_brightness_pct: "{{ door_colors[base_name].brightness_pct }}"

      notif_message: "{{ now().strftime('%-I:%M %p') }} {{ display_name }} 🏃🚪👀"


  # 2. If this is the FIRST tracked door to open (all other tracked doors are
  #    still closed), snapshot the LIFX lights into a scene so the close
  #    automation can restore them. If another door is already open, the
  #    snapshot was taken on that earlier open — do NOT overwrite it, or we'd
  #    capture the disruption color and "restore" to red later.
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% set others = all_doors | reject('equalto', trigger.entity_id) | list %}
              {% set others_open = others | map('states') | select('equalto', 'on') | list | length %}
              {{ others_open == 0 }}
        sequence:
          - action: scene.create
            data:
              scene_id: house_state_pre_door_disruption
              # TODO: Replace with the actual light entity_ids for the targets by the
              # lifx.set_state action. scene.create needs entity_ids (not device_ids)
              # find them in HA ▸ Settings ▸ Devices ▸ <LIFX device> ▸ Entities.
              snapshot_entities:
                - light.kitchen_table_light
                - light.<entity_1>s_lamp
                - light.<entity_2>s_lamp

  # 3. Run the bedtime-disruption actions concurrently.
  - parallel:
      # Turn off TV.
      - type: turn_off
        device_id: 165...267
        entity_id: 741...55f
        domain: remote

      # Turn off media player.
      - action: media_player.turn_off
        target:
          device_id: 06f...bfc

      # Lights -> door-specific color.
      - action: lifx.set_state
        data:
          power: true
          rgb_color: "{{ lifx_rgb }}"
          brightness_pct: "{{ lifx_brightness_pct }}"
        target:
          device_id:
            - dfd...50b
            - 921...86f
            - 83e...943

      # Notify parent phones with the per-door message.
      - data:
          message: "{{ notif_message }}"
        action: notify.boss_phones


# ----------------------
# Door Closes After Bedtime (multi-door)
# ----------------------
# Sibling of the opens automation. Two behaviors, different scopes:
#   - Notify parent phones with the closing door's name on EVERY close
#     (even if other tracked doors are still open).
#   - Revert the LIFX lights to the pre-disruption state ONLY when ALL
#     tracked doors are now closed. Uses the scene snapshot captured by the
#     opens automation, so the room returns to whatever mood it was in
#     before the first door opened.
#
# Intent: if one kid closes their door but the other is still up and out,
# the lights STAY in disruption color — the room is still interrupted until
# everyone is back in bed.
#
# Restore strategy: we DON'T use scene.turn_on. LIFX firmware stores the
# most recently set color, and scene.turn_on would just call light.turn_off
# on any light that was off in the snapshot — leaving the door-disruption
# red/purple as the bulb's "remembered" color. Next manual on would then
# come up red/purple. Instead we iterate the tracked lights and call
# lifx.set_state per-light: it lets us push the snapshotted color/brightness
# AND the snapshotted power state in one call, so off lights still get
# their pre-disruption color stored in firmware for the next manual on.
alias: Door Closes After Bedtime
mode: parallel
triggers:
  - entity_id:
      - binary_sensor.<entity_3>s_door_door
      - binary_sensor.<entity_4>s_door_door
    from: "on"
    to: "off"
    trigger: state
conditions:
  - condition: time
    after: "19:45:00"
    before: "23:59:00"
    weekday: [mon, tue, wed, thu, fri, sat, sun]
actions:
  # 1. Same base_name + display_name derivation as the opens automation.
  - variables:
      # Keep in sync with the opens automation's all_doors and triggers list.
      all_doors:
        - binary_sensor.<entity_3>s_door_door
        - binary_sensor.<entity_4>s_door_door

      base_name: >
        {{ trigger.entity_id
          | replace('binary_sensor.', '')
          | replace('_door_door', '')
          | regex_replace(find='s$', replace='') }}

      display_name: "{{ base_name | replace('_',' ') | title }}"

      notif_message: "{{ now().strftime('%-I:%M %p') }} {{ display_name }} 🚪🔒"

  # 2. Always notify parent phones — one message per door close, regardless
  #    of whether any other door is still open.
  - data:
      message: "{{ notif_message }}"
    action: notify.boss_phones

  # 3. Only revert the LIFX lights when ALL tracked doors are now closed.
  #    states() already reflects the trigger's new 'off' value by the time
  #    actions run, so open_count == 0 means every tracked door is closed.
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% set open = all_doors | map('states') | select('equalto', 'on') | list | length %}
              {{ open == 0 }}
        sequence:
          # Per-light restore via lifx.set_state. See the header comment for
          # why we don't use scene.turn_on.
          #
          # tracked_lights MUST stay in sync with snapshot_entities in the
          # opens automation's scene.create call.
          - variables:
              tracked_lights:
                - light.kitchen_table_light
                - light.<entity_1>s_lamp
                - light.<entity_2>s_lamp
              # Scene's 'entities' attribute is a dict keyed by entity_id with
              # each entity's snapshotted state + attributes (state, brightness,
              # hs_color, color_temp_kelvin, color_mode, ...).
              snap: "{{ state_attr('scene.house_state_pre_door_disruption', 'entities') or {} }}"

          - repeat:
              for_each: "{{ tracked_lights }}"
              sequence:
                - variables:
                    ent: "{{ repeat.item }}"
                    es: "{{ snap.get(repeat.item, {}) }}"
                    want_on: "{{ es.get('state') == 'on' }}"
                    mode: "{{ es.get('color_mode') }}"
                    hs: "{{ es.get('hs_color') }}"
                    ct_k: "{{ es.get('color_temp_kelvin') }}"
                    bri: "{{ es.get('brightness') }}"
                - choose:
                    # Light was in color-temp mode -> restore Kelvin.
                    - conditions:
                        - condition: template
                          value_template: "{{ mode == 'color_temp' and ct_k not in [none, 'unknown'] }}"
                      sequence:
                        - action: lifx.set_state
                          target:
                            entity_id: "{{ ent }}"
                          data:
                            power: "{{ want_on }}"
                            color_temp_kelvin: "{{ ct_k | int }}"
                            brightness: "{{ bri | int(128) }}"
                            transition: 0
                  # Default: restore HS color (covers hs/rgb/xy modes, and
                  # falls back to a neutral value if the snapshot was empty
                  # because the light was unavailable at snapshot time).
                  default:
                    - action: lifx.set_state
                      target:
                        entity_id: "{{ ent }}"
                      data:
                        power: "{{ want_on }}"
                        hs_color: "{{ hs if hs else [0, 0] }}"
                        brightness: "{{ bri | int(128) }}"
                        transition: 0
