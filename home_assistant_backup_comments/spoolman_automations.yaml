# Spoolman Filament Usage Tracking
#
# Automations and scripts that push filament usage data from Elegoo printers
# to Spoolman via its REST API + the HA service (spoolman.use_spool_filament).
#
# CC2: Per-slot grams from the gcode capture proxy, cached before print
#       completes (slot sensors clear to "unknown" on completion).
# CC1: Filament name + weight parsed from a custom filename template.
#       Slicer template: [input_filename_base]_{filament_preset[0]}_{total_weight}g
#
# Matching: Both automations resolve Spoolman spools by filament name and
#           cascade usage across them, lowest remaining_weight first
#           (random tie-break on equal weights). Each spool is drained to 0
#           before the next is touched. If total available is less than
#           use_weight, all matching spools are drained and a warning
#           notification fires.
#
# Required helpers (create in HA UI -> Settings -> Devices -> Helpers):
#   - input_text.centauri_carbon_2_cached_slot_data (max length: 255)
#     Stores a JSON blob of CC2 per-slot filament names and grams.
#
# Required integrations:
#   - Elegoo Printer (with CC2 gcode proxy URL configured)
#   - Spoolman Home Assistant (https://github.com/Disane87/spoolman-homeassistant)
#
# Required rest_command (add to configuration.yaml):
#   rest_command:
#     spoolman_find_spools_by_name:
#       url: "http://192.168.1.1:7912/api/v1/spool?filament.name={{ filament_name | urlencode }}&allow_archived=false"
#       method: GET
#       content_type: "application/json"


# ============================================================================
# SCRIPT: Update Spoolman From Filament Name
# ============================================================================
# Reusable script called by both CC2 and CC1 automations. Takes a filament
# name and weight, queries the Spoolman REST API for matching non-archived
# spools, then cascades the deduction across them: lowest remaining_weight
# first (random tie-break for equal weights), draining each spool to 0
# before moving to the next, until use_weight is exhausted.
#
# If no spool matches, fires a "no matching spool" persistent notification.
# If the total available across all matching spools is less than use_weight,
# every matching spool is drained to 0 and an "insufficient spool weight"
# notification is fired with the unaccounted gram count.
#
# Why REST instead of HA entities: The Spoolman HA integration (v1.3.0)
# creates filament-level entities (sensor.spoolman_filament_N), and may not create
# spool-level. The filament entity `id` attribute is a filament ID which
# doesn't correspond to a spool ID — passing it to use_spool_filament would
# deduct from the wrong spool. Querying the API returns actual spool objects
# with correct spool IDs.
#
# Add via the UI: Settings → Automations & Scenes → Scripts → + Create Script → switch
# to YAML mode → paste the content under update_spoolman_from_filament_name: (the
# sequence, fields, alias, mode, max parts).

update_spoolman_from_filament_name:
  alias: Update Spoolman From Filament Name
  mode: queued
  max: 10
  fields:
    filament_name:
      required: true
      name: Filament Name
      description: Must match the Spoolman filament name exactly.
      selector:
        text:
    use_weight:
      required: true
      name: Use Weight (grams)
      selector:
        number:
          min: 0
          max: 100000
          step: 0.01
          unit_of_measurement: g
  sequence:
    # Query Spoolman REST API for non-archived spools whose filament name
    # matches. Returns spool-level objects with correct spool IDs.
    - action: rest_command.spoolman_find_spools_by_name
      data:
        filament_name: "{{ filament_name }}"
      response_variable: spool_response

    # Build the cascade list: keep spools with positive remaining_weight,
    # attach a random _jitter, sort by jitter then by remaining_weight. Jinja's
    # sort is stable, so the second sort preserves random order within each
    # weight tier (e.g. five 1000g spools end up in random order).
    - variables:
        sorted_spools: >
          {% set raw = spool_response.content if spool_response.status == 200
              else '[]' %}
          {% set spools = raw if (raw is iterable and raw is not string)
              else (raw | from_json(default=[])) %}
          {% set ns = namespace(items=[]) %}
          {% for s in spools %}
            {% set w = s.remaining_weight | float(0) %}
            {% if w > 0 %}
              {% set ns.items = ns.items
                  + [dict(s, _jitter=range(0, 99999) | random)] %}
            {% endif %}
          {% endfor %}
          {{ (ns.items | sort(attribute='_jitter'))
                | sort(attribute='remaining_weight') }}
        total_available: >
          {% set raw = spool_response.content if spool_response.status == 200
              else '[]' %}
          {% set spools = raw if (raw is iterable and raw is not string)
              else (raw | from_json(default=[])) %}
          {{ spools | map(attribute='remaining_weight')
                   | map('float', 0) | sum | round(4) }}
        remaining_use: "{{ use_weight | float(0) | round(4) }}"

    - choose:
        # No candidate spools: warn and bail.
        - conditions:
            - condition: template
              value_template: "{{ sorted_spools | length == 0 }}"
          sequence:
            - action: persistent_notification.create
              data:
                title: "Spoolman: No matching spool"
                message: >
                  Could not find a non-archived Spoolman spool with filament
                  name "{{ filament_name }}". The print used {{ use_weight }}g
                  that was not tracked.

        # Cascade: walk sorted spools, draining each to 0 before moving on
        # until remaining_use is exhausted.
        - conditions:
            - condition: template
              value_template: "{{ sorted_spools | length > 0 }}"
          sequence:
            - repeat:
                for_each: "{{ sorted_spools }}"
                sequence:
                  # Single-line "{{ ... }}" form preserves numeric type so the
                  # `<= 0` check below and arithmetic in subsequent iterations
                  # don't accidentally compare strings.
                  - variables:
                      spool_remaining: "{{ repeat.item.remaining_weight | float(0) | round(4) }}"
                      to_deduct: >-
                        {{ 0 if (remaining_use | float(0)) <= 0
                              else ([remaining_use | float(0),
                                     spool_remaining | float(0)] | min) }}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ to_deduct | float(0) > 0 }}"
                        sequence:
                          - action: spoolman.use_spool_filament
                            data:
                              id: "{{ repeat.item.id | int }}"
                              use_weight: "{{ to_deduct | float(0) | round(2) }}"
                          - variables:
                              remaining_use: "{{ ((remaining_use | float(0)) - (to_deduct | float(0))) | round(4) }}"

            # Insufficient total: every matching spool was drained to 0 but
            # there's still unaccounted usage. Surface it for manual cleanup.
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ (remaining_use | float(0)) > 0.01 }}"
                  sequence:
                    - action: persistent_notification.create
                      data:
                        title: "Spoolman: Insufficient spool weight"
                        message: >
                          Print used {{ use_weight }}g of "{{ filament_name }}"
                          but only {{ total_available }}g was available across
                          {{ sorted_spools | length }} spool(s). All matching
                          spools drained to 0;
                          {{ (remaining_use | float(0)) | round(2) }}g
                          unaccounted. Verify physical spools and adjust
                          Spoolman manually.


---
# ============================================================================
# AUTOMATION: Cache CC2 Slot Data
# ============================================================================
# The CC2 per-slot sensors (A1-A4 grams and names) are populated when proxy
# data is fetched at print start but clear to "unknown" on print complete.
# This caches the slot data into an input_text helper as a JSON blob so the
# Spoolman push automation can read it after completion.

alias: Cache CC2 Slot Data
mode: single
triggers:
  - entity_id:
      - sensor.centauri_carbon_2_a1_grams
    trigger: state
conditions:
  - condition: template
    value_template: >
      {{ trigger.to_state.state not in ['unknown', 'unavailable'] }}
actions:
  - action: input_text.set_value
    target:
      entity_id: input_text.centauri_carbon_2_cached_slot_data
    data:
      value: >
        {% set n1 = states('sensor.centauri_carbon_2_a1_name') %}
        {% set n2 = states('sensor.centauri_carbon_2_a2_name') %}
        {% set n3 = states('sensor.centauri_carbon_2_a3_name') %}
        {% set n4 = states('sensor.centauri_carbon_2_a4_name') %}
        {{ {
          'a1': {'name': '' if n1 in ['unknown','unavailable'] else n1,
                 'grams': states('sensor.centauri_carbon_2_a1_grams') | float(0) | round(2)},
          'a2': {'name': '' if n2 in ['unknown','unavailable'] else n2,
                 'grams': states('sensor.centauri_carbon_2_a2_grams') | float(0) | round(2)},
          'a3': {'name': '' if n3 in ['unknown','unavailable'] else n3,
                 'grams': states('sensor.centauri_carbon_2_a3_grams') | float(0) | round(2)},
          'a4': {'name': '' if n4 in ['unknown','unavailable'] else n4,
                 'grams': states('sensor.centauri_carbon_2_a4_grams') | float(0) | round(2)}
        } | to_json }}


---
# ============================================================================
# AUTOMATION: CC2 Spoolman Update
# ============================================================================
# On CC2 print complete, reads the cached per-slot data and pushes usage to
# Spoolman for each slot that consumed filament.

alias: CC2 Spoolman Update
mode: single
triggers:
  - entity_id:
      - sensor.centauri_carbon_2_print_status
    to: complete
    trigger: state
conditions: []
actions:
  - variables:
      raw_data: "{{ states('input_text.centauri_carbon_2_cached_slot_data') }}"

  # Guard: make sure we have cached data
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ raw_data not in ['unknown', 'unavailable', '', 'None'] }}
        sequence:
          - variables:
              slot_data: "{{ raw_data if raw_data is mapping else raw_data | from_json }}"
          - repeat:
              for_each:
                - a1
                - a2
                - a3
                - a4
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {% set slot = slot_data[repeat.item] %}
                            {{ slot.grams | float(0) > 0
                               and slot.name not in ['', none, 'None'] }}
                      sequence:
                        - action: script.update_spoolman_from_filament_name
                          data:
                            filament_name: "{{ slot_data[repeat.item].name }}"
                            use_weight: "{{ slot_data[repeat.item].grams | float | round(2) }}"
    default:
      - action: persistent_notification.create
        data:
          title: "Spoolman: CC2 no cached slot data"
          message: >
            CC2 print completed but no cached slot data was found.
            Filament usage was not tracked. Make sure the gcode capture
            proxy is configured and the "Cache CC2 Slot Data" automation
            is enabled.


---
# ============================================================================
# AUTOMATION: CC1 Spoolman Update
# ============================================================================
# On CC1 print complete, parses the filament name and weight from the cached
# filename (set by the existing "Cache 3D Print Filename" automation).
#
# Expected filename format: CC1_benchy_ElegooPLA-Basic-White_2.50g.gcode
# Slicer template:          [input_filename_base]_{filament_preset[0]}_{total_weight}g
#
# Parsing: split on "_", weight is last token (Ng), filament name is
# second-to-last token (always hyphenated, never contains underscores).

alias: CC1 Spoolman Update
mode: single
triggers:
  - entity_id:
      - sensor.centauri_carbon_print_status
    to: complete
    trigger: state
conditions: []
actions:
  - variables:
      filename: >
        {{ states('input_text.centauri_carbon_last_file') | replace('.gcode', '') }}
      parts: "{{ filename.split('_') }}"
      weight_grams: "{{ parts[-1] | replace('g', '') | float(0) }}"
      filament_name: "{{ parts[-2] | default('') }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ weight_grams > 0
                 and filament_name != ''
                 and '-' in filament_name }}
        sequence:
          - action: script.update_spoolman_from_filament_name
            data:
              filament_name: "{{ filament_name }}"
              use_weight: "{{ weight_grams | float | round(2) }}"
    default:
      - action: persistent_notification.create
        data:
          title: "Spoolman: CC1 filename parse failed"
          message: >
            Could not parse filament name and weight from filename
            "{{ states('input_text.centauri_carbon_last_file') }}".
            Expected format: [model]_[FilamentName-With-Hyphens]_[weight]g.gcode
