type: custom:auto-entities
filter:
  include:
    - integration: "*spoolman*"
      sort:
        method: attribute
        attribute: remaining_weight
        numeric: true
        reverse: false
      attributes:
        archived: false
      options:
        type: custom:entity-progress-card-template
        color: "#{{ state_attr(entity, 'filament_color_hex') }}"
        icon: mdi:printer-3d-nozzle
        bar_effect: gradient
        bar_position: bottom
        percent: "{{ 100 - state_attr(entity, 'used_percentage') | float(0) }}"
        badge_icon: >
          {% if state_attr(entity, 'id')
             == states('input_number.current_spool_id') | int %}
            mdi:check-circle
          {% endif %}
        badge_color: >
          {% if state_attr(entity, 'id')
             == states('input_number.current_spool_id') | int %}
            green
          {% else %}
            default_color
          {% endif %}
        name: "{{ state_attr(entity, 'filament_name') or 'Unknown Spool' }}"
        secondary: |
          {% set location = state_attr(entity, 'location') %}
          {% if location %}
            {{ (state_attr(entity, 'remaining_weight') | float) | round(2) }} g ({{ location }})
          {% else %}
            {{ (state_attr(entity, 'remaining_weight') | float) | round(2) }} g
          {% endif %}
        custom_theme:
          - min: 0
            max: 10
            bar_color: red
          - min: 10
            max: 25
            bar_color: yellow
          - min: 25
            max: 100
            bar_color: var(--state-icon-color)
        tap_action:
          action: more-info
sort:
  method: attribute
  attribute: filament_name
  ignore_case: true
  reverse: false
card:
  type: grid
  columns: 1
  square: false
card_param: cards
