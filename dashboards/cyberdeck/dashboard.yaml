# ═══════════════════════════════════════════════════════════════════
#  CYBERDECK  —  Printer Farm Control Dashboard
#  Neon-cyberpunk HUD for Elegoo Centauri Carbon printers
# ═══════════════════════════════════════════════════════════════════

button_card_templates:

  # ── base card reset ──────────────────────────────────────────
  cyberdeck_base:
    show_name: false
    show_icon: false
    show_state: false
    styles:
      card:
        - background: "var(--cyberdeck-surface)"
        - border: "1px solid rgba(0,229,255,0.12)"
        - border-radius: "4px"
        - box-shadow: "none"
        - font-family: "'Share Tech Mono', monospace"
        - padding: "0"
        - overflow: "hidden"

  # ── unit label  (variables: unit, label) ────────────────────────
  unit_label:
    show_name: true
    show_icon: false
    show_state: false
    name: |
      [[[
        const u   = variables.unit  || 'U.??';
        const lbl = variables.label || '';
        return `<span style="display:inline-block;border:1px solid rgba(0,229,255,0.55);
                     background:rgba(10,28,42,0.92);border-radius:6px;padding:7px 14px;margin-right:10px;
                     color:#f2f6ff;font-size:13px;font-weight:700;line-height:1;
                     font-family:'JetBrains Mono','Fira Code','IBM Plex Mono','Share Tech Mono',monospace;
                     letter-spacing:1px;font-variant-numeric:slashed-zero;">${u}</span><span style="color:var(--cyberdeck-text-dim);font-size:10px;letter-spacing:1px;">${lbl}</span>`;
      ]]]
    styles:
      card:
        - background: "transparent"
        - border: "none"
        - border-radius: "0"
        - padding: "6px 0 6px 6px"
        - margin: "0"
        - box-shadow: "none"
      name:
        - justify-self: "start"
        - white-space: "nowrap"
        - padding: "0"

  # ── unit status pill  (variables: status_entity) ───────────────
  unit_status_pill:
    template: cyberdeck_base
    custom_fields:
      content: |
        [[[
          const st   = states[variables.status_entity];
          const raw  = st ? st.state : 'unknown';
          const off  = (raw === 'unknown' || raw === 'unavailable');
          const up   = (raw === 'printing');
          const idle = (raw === 'idle' || raw === 'ready' || raw === 'standby');
          const disp = off ? 'OFFLINE' : raw.replace(/_/g,' ').toUpperCase();
          const dot  = off ? 'var(--cyberdeck-text-dim)' : up ? 'var(--cyberdeck-magenta)' : idle ? 'var(--cyberdeck-cyan)' : 'var(--cyberdeck-yellow)';
          const glow = up ? '0 0 8px var(--cyberdeck-magenta)' : 'none';
          return `
            <div style="display:flex;align-items:center;justify-content:flex-end;padding:10px 12px 6px 0;white-space:nowrap;">
              <span style="border:1px solid ${dot};color:${dot};padding:2px 10px;font-size:10px;
                           border-radius:2px;box-shadow:${glow};letter-spacing:1px;">
                <span style="display:inline-block;width:6px;height:6px;border-radius:50%;
                             background:${dot};margin-right:5px;vertical-align:middle;"></span>${disp}
              </span>
            </div>`;
        ]]]
    styles:
      card:
        - background: "transparent"
        - border: "none"
        - border-radius: "0"
        - padding: "0"
        - margin: "0"
        - box-shadow: "none"

  # ── job info panel  (variables: pct_entity, file_entity, eta_entity, end_entity, status_entity, cost_entity) ─
  unit_job_info:
    template: cyberdeck_base
    custom_fields:
      info: |
        [[[
          const pctE  = states[variables.pct_entity];
          const fileE = states[variables.file_entity];
          const etaE  = states[variables.eta_entity];
          const endE  = states[variables.end_entity];
          const costE = variables.cost_entity ? states[variables.cost_entity] : null;
          const stE   = variables.status_entity ? states[variables.status_entity] : null;
          const rawSt = stE ? String(stE.state).toLowerCase() : '';
          const activePrint = rawSt === 'printing' || rawSt === 'paused';

          const pct  = pctE  ? parseFloat(pctE.state)  || 0 : 0;
          const file = fileE ? fileE.state : '—';
          const fname = (file && file !== 'unknown' && file !== 'unavailable')
                        ? file.replace('.gcode','').replace(/_/g,' ').toUpperCase().substring(0,22)
                        : '—';

          let etaStr = '—';
          if (etaE && etaE.state && etaE.state !== 'unknown' && etaE.state !== 'unavailable') {
            const mins = parseFloat(etaE.state);
            if (!isNaN(mins) && mins > 0) {
              const h = Math.floor(mins / 60);
              const m = Math.round(mins % 60);
              etaStr = h > 0 ? (h + 'h ' + String(m).padStart(2,'0') + 'm') : (m + ' min');
            }
          }

          let finStr = '—';
          if (endE && endE.state && endE.state !== 'unknown' && endE.state !== 'unavailable') {
            try {
              const d = new Date(endE.state);
              let fh = d.getHours();
              const fm = d.getMinutes();
              const ampm = fh >= 12 ? 'PM' : 'AM';
              fh = fh % 12;
              if (fh === 0) fh = 12;
              finStr = fh + ':' + String(fm).padStart(2,'0') + ' ' + ampm;
            } catch(e) { finStr = '—'; }
          }

          let costStr = '—';
          if (costE && costE.state && costE.state !== 'unknown' && costE.state !== 'unavailable') {
            const cv = parseFloat(costE.state);
            if (!isNaN(cv)) costStr = '$' + cv.toFixed(2);
          }

          const pctLine = activePrint
            ? `<div style="color:var(--cyberdeck-magenta);font-size:28px;font-weight:700;line-height:1.1;
                        text-shadow:0 0 14px rgba(233,30,140,0.4);">${pct.toFixed(1)}<span style="font-size:14px;opacity:0.7;">%</span></div>`
            : `<div style="color:var(--cyberdeck-text-dim);font-size:28px;font-weight:700;line-height:1.1;">—</div>`;

          return `
            <div style="display:flex;flex-direction:column;gap:6px;padding:6px 10px;">
              <div>
                <div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;">JOB</div>
                <div style="color:var(--cyberdeck-text);font-size:11px;line-height:1.3;word-break:break-all;">${fname}</div>
              </div>
              <div>
                <div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;">PROGRESS</div>
                ${pctLine}
              </div>
              <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <div style="min-width:0;flex:1 1 auto;">
                  <div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;">ETA</div>
                  <div style="color:var(--cyberdeck-cyan);font-size:13px;">${etaStr}</div>
                </div>
                <div style="min-width:0;flex:1 1 auto;">
                  <div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;">FIN.</div>
                  <div style="color:var(--cyberdeck-text);font-size:13px;">${finStr}</div>
                </div>
                <div style="min-width:0;flex:1 1 auto;">
                  <div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;">COST</div>
                  <div style="color:var(--cyberdeck-green);font-size:13px;">${costStr}</div>
                </div>
              </div>
            </div>`;
        ]]]
    styles:
      card:
        - background: "var(--cyberdeck-surface-raised)"
        - border: "none"
        - border-radius: "4px"
        - padding: "0"
        - min-height: "140px"
      custom_fields:
        info:
          - width: "100%"

  # ── segmented progress bar  (variables: pct_entity, status_entity) ──────────
  unit_progress_bar:
    template: cyberdeck_base
    custom_fields:
      bar: |
        [[[
          const pctE = states[variables.pct_entity];
          const stE  = variables.status_entity ? states[variables.status_entity] : null;
          const rawSt = stE ? String(stE.state).toLowerCase() : '';
          const activePrint = rawSt === 'printing' || rawSt === 'paused';
          const pct  = pctE ? parseFloat(pctE.state) || 0 : 0;
          const segs = 40;
          const filled = activePrint ? Math.round(segs * pct / 100) : 0;
          let barOut =
            '<div style="width:100%;max-width:100%;box-sizing:border-box;padding:6px 14px 8px;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;width:100%;min-width:0;box-sizing:border-box;">' +
            '<span style="flex:0 0 auto;color:var(--cyberdeck-text-dim);font-size:8px;letter-spacing:2px;opacity:0.9;">0</span>' +
            '<div style="flex:1 1 0;min-width:0;box-sizing:border-box;border:1px solid rgba(0,229,255,0.45);' +
            'border-radius:3px;background:rgba(0,229,255,0.06);padding:3px 4px;' +
            'box-shadow:inset 0 0 10px rgba(0,0,0,0.35);">' +
            '<div style="display:flex;gap:2px;width:100%;min-width:0;box-sizing:border-box;">';
          for (let i = 0; i < segs; i++) {
            let c;
            if (i < filled) {
              const ratio = i / segs;
              if (ratio < 0.5) c = 'var(--cyberdeck-cyan)';
              else if (ratio < 0.8) c = 'var(--cyberdeck-magenta)';
              else c = 'var(--cyberdeck-green)';
            } else {
              c = 'var(--cyberdeck-surface-raised)';
            }
            barOut += `<div style="flex:1 1 0;min-width:2px;height:6px;background:${c};border-radius:1px;
                                  ${i < filled ? 'box-shadow:0 0 4px '+c+';' : ''}"></div>`;
          }
          barOut += '</div></div>' +
            '<span style="flex:0 0 auto;color:var(--cyberdeck-text-dim);font-size:8px;letter-spacing:2px;opacity:0.9;">100</span>' +
            '</div></div>';
          return barOut;
        ]]]
    styles:
      card:
        - background: "transparent"
        - border: "none"
        - padding: "0"
        - box-shadow: "none"
        - width: "100%"
        - min-width: "0"
        - max-width: "100%"
        - align-self: "stretch"
      custom_fields:
        bar:
          - width: "100%"
          - min-width: "0"
          - max-width: "100%"
          - justify-self: "stretch"
          - box-sizing: "border-box"
    card_mod:
      style: |
        ha-card {
          width: 100% !important;
          max-width: 100% !important;
          min-width: 0 !important;
          box-sizing: border-box !important;
          align-self: stretch !important;
          display: block !important;
          margin: 0 !important;
        }

  # ── control button  (variables: btn_label, btn_color, btn_glow) ──
  control_btn:
    show_name: true
    show_icon: false
    show_state: false
    styles:
      card:
        - background: "transparent"
        - border: "1px solid var(--btn-color)"
        - border-radius: "4px"
        - padding: "8px 4px"
        - font-family: "'Share Tech Mono', monospace"
        - box-shadow: "none"
        - box-sizing: "border-box"
        - "--btn-color": "[[[ return variables.btn_color || 'var(--cyberdeck-cyan)'; ]]]"
      name:
        - color: "[[[ return variables.btn_color || 'var(--cyberdeck-cyan)'; ]]]"
        - font-size: "11px"
        - font-weight: "700"
        - letter-spacing: "1px"
        - font-family: "'Share Tech Mono', monospace"
        - overflow: "hidden"
        - white-space: "nowrap"
        - text-overflow: "ellipsis"
        - text-align: "center"
        - max-width: "100%"
    card_mod:
      style: |
        ha-card {
          width: 100% !important;
          max-width: 100% !important;
          min-width: 0 !important;
          box-sizing: border-box !important;
          overflow: hidden !important;
        }
    state:
      - value: "unavailable"
        styles:
          card:
            - opacity: "0.3"
            - pointer-events: "none"

  # ── spools strip (variables: printer = cc1 | cc2) ─────────────
  unit_spools:
    template: cyberdeck_base
    custom_fields:
      spools: |
        [[[
          const printer = variables.printer || 'cc1';
          let out = '<div style="padding:10px 14px 12px;border-top:1px solid rgba(0,229,255,0.08);">';
          out += '<div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;margin-bottom:8px;">SPOOLS.LOADED</div>';
          if (printer === 'cc1') {
            const cc1Name = states['sensor.cc1_loaded_filament_name'];
            const cc1Grams = states['sensor.cc1_spoolman_grams'];
            if (cc1Name && cc1Name.state && !['unknown','unavailable'].includes(cc1Name.state)) {
              const g = cc1Grams ? parseFloat(cc1Grams.state) || 0 : 0;
              out += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--cyberdeck-cyan);flex-shrink:0;"></span>
                <span style="color:var(--cyberdeck-text);font-size:11px;flex:1;">${cc1Name.state.toUpperCase()}</span>
                <span style="color:var(--cyberdeck-text-dim);font-size:11px;">${g > 0 ? g.toFixed(0)+'g' : '—'}</span>
              </div>`;
            } else {
              out += '<div style="color:var(--cyberdeck-text-dim);font-size:11px;">—</div>';
            }
          } else {
            const slots = [
              { name: states['sensor.centauri_carbon_2_a1_name'],
                color: states['sensor.centauri_carbon_2_a1_color'],
                grams: states['sensor.cc2_a1_spoolman_grams'] },
              { name: states['sensor.centauri_carbon_2_a2_name'],
                color: states['sensor.centauri_carbon_2_a2_color'],
                grams: states['sensor.cc2_a2_spoolman_grams'] },
              { name: states['sensor.centauri_carbon_2_a3_name'],
                color: states['sensor.centauri_carbon_2_a3_color'],
                grams: states['sensor.cc2_a3_spoolman_grams'] },
              { name: states['sensor.centauri_carbon_2_a4_name'],
                color: states['sensor.centauri_carbon_2_a4_color'],
                grams: states['sensor.cc2_a4_spoolman_grams'] },
            ];
            let any = false;
            for (const s of slots) {
              const n = s.name ? s.name.state : '';
              if (!n || ['unknown','unavailable'].includes(n)) continue;
              any = true;
              const c = (s.color && s.color.state && s.color.state.startsWith('#'))
                        ? s.color.state : 'var(--cyberdeck-magenta)';
              const g = s.grams ? parseFloat(s.grams.state) || 0 : 0;
              out += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;"></span>
                <span style="color:var(--cyberdeck-text);font-size:11px;flex:1;">${n.toUpperCase()}</span>
                <span style="color:var(--cyberdeck-text-dim);font-size:11px;">${g > 0 ? g.toFixed(0)+'g' : '—'}</span>
              </div>`;
            }
            if (!any) out += '<div style="color:var(--cyberdeck-text-dim);font-size:11px;">—</div>';
          }
          out += '</div>';
          return out;
        ]]]
    styles:
      card:
        - background: "transparent"
        - border: "none"
        - border-radius: "0"
        - padding: "0"
        - margin: "0"
        - box-shadow: "none"
      custom_fields:
        spools:
          - width: "100%"

  # ── Filament inventory row (auto-entities + Spoolman) ───────
  filament_inventory_row:
    template: cyberdeck_base
    show_name: false
    show_icon: false
    show_state: false
    tap_action:
      action: more-info
    custom_fields:
      row: |
        [[[
          const ent = entity;
          if (!ent) return '';
          const a = ent.attributes || {};
          const name = (a.filament_name || 'Unknown').toString();
          let rawHex = (a.filament_color_hex || '00e5ff').toString().trim();
          if (rawHex.startsWith('#')) rawHex = rawHex.slice(1);
          if (!/^[0-9a-fA-F]{6}$/.test(rawHex)) rawHex = '00e5ff';
          const col = '#' + rawHex.toLowerCase();
          const used = parseFloat(a.used_percentage);
          const remPct = isNaN(used) ? 0 : Math.max(0, Math.min(100, 100 - used));
          const rw = parseFloat(a.remaining_weight);
          const loc = a.location ? String(a.location) : '';
          const gramsStr = !isNaN(rw) ? rw.toFixed(2) + ' g' : '—';
          const sub = loc ? (gramsStr + ' · ' + loc) : gramsStr;
          const segs = 40;
          const filled = Math.round(segs * remPct / 100);
          const curE = states['input_number.current_spool_id'];
          const curId = curE && curE.state !== undefined && curE.state !== 'unknown' && curE.state !== 'unavailable'
            ? String(curE.state) : null;
          const myId = a.id !== undefined && a.id !== null ? String(a.id) : '';
          const isCurrent = curId !== null && myId !== '' && curId === myId;
          const badge = isCurrent
            ? '<span style="border:1px solid var(--cyberdeck-green);color:var(--cyberdeck-green);padding:1px 6px;font-size:8px;border-radius:2px;letter-spacing:1px;flex-shrink:0;">LOADED</span>'
            : '';
          let segsHtml = '<div style="display:flex;gap:2px;width:100%;min-width:0;box-sizing:border-box;">';
          for (let i = 0; i < segs; i++) {
            const on = i < filled;
            const bg = on ? col : 'var(--cyberdeck-surface-raised)';
            const gl = on ? ('box-shadow:0 0 4px ' + col + ', 0 0 10px ' + col + '44;') : '';
            segsHtml += '<div style="flex:1 1 0;min-width:2px;height:6px;background:' + bg + ';border-radius:1px;' + gl + '"></div>';
          }
          segsHtml += '</div>';
          return `
            <div style="padding:8px 10px 10px;">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;">
                <span style="color:var(--cyberdeck-text);font-size:12px;font-weight:700;letter-spacing:0.5px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">${name}</span>
                ${badge}
              </div>
              <div style="color:var(--cyberdeck-text-dim);font-size:10px;margin-bottom:8px;line-height:1.3;">${sub}</div>
              <div style="display:flex;align-items:center;gap:8px;width:100%;min-width:0;">
                <span style="flex:0 0 auto;color:var(--cyberdeck-text-dim);font-size:8px;letter-spacing:2px;opacity:0.9;">0</span>
                <div style="flex:1 1 0;min-width:0;box-sizing:border-box;border:1px solid rgba(0,229,255,0.45);border-radius:3px;background:rgba(0,229,255,0.06);padding:3px 4px;box-shadow:inset 0 0 10px rgba(0,0,0,0.35);">
                  ${segsHtml}
                </div>
                <span style="flex:0 0 auto;color:var(--cyberdeck-text-dim);font-size:8px;letter-spacing:2px;opacity:0.9;">100</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;">
                <span style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:2px;">REMAINING</span>
                <span style="color:${col};font-size:15px;font-weight:700;line-height:1;text-shadow:0 0 12px ${col}88;">${remPct.toFixed(1)}<span style="font-size:11px;opacity:0.8;">%</span></span>
              </div>
            </div>`;
        ]]]
    styles:
      card:
        - background: "var(--cyberdeck-surface-raised)"
        - border: "1px solid rgba(0,229,255,0.12)"
        - border-radius: "4px"
        - padding: "0"
        - margin: "0 0 10px 0"
        - box-shadow: "none"
      custom_fields:
        row:
          - width: "100%"

# ═══════════════════════════════════════════════════════════════════
#  VIEW
# ═══════════════════════════════════════════════════════════════════

views:
  - title: FARM_CTL
    path: farm-ctl
    theme: Cyberdeck
    panel: true
    cards:
      - type: vertical-stack
        cards:

          # ══════════════════════════════════════════════════════
          #  HEADER BAR
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.printer_farm_online_count
            template: cyberdeck_base
            custom_fields:
              header: |
                [[[
                  const count = entity ? entity.state : '0';
                  const now = new Date();
                  const pad = n => String(n).padStart(2,'0');
                  let th = now.getHours();
                  const tmin = now.getMinutes();
                  const tsec = now.getSeconds();
                  const ampm = th >= 12 ? 'PM' : 'AM';
                  th = th % 12;
                  if (th === 0) th = 12;
                  const ts = now.getFullYear() + '.' + pad(now.getMonth()+1) + '.' + pad(now.getDate())
                             + ' · ' + th + ':' + pad(tmin) + ':' + pad(tsec) + ' ' + ampm + ' LCL';
                  return `
                    <div style="display:flex;flex-wrap:wrap;width:100%;box-sizing:border-box;
                                align-items:flex-start;gap:12px;padding:14px 16px 10px;">
                      <div style="flex:1 1 160px;min-width:0;">
                        <div style="color:var(--cyberdeck-cyan);font-size:9px;letter-spacing:2.5px;opacity:0.92;">// PRINT_NODE.NETWORK</div>
                        <div style="font-size:26px;font-weight:700;letter-spacing:3px;line-height:1.15;margin-top:2px;">
                          <span style="display:inline-block;background:linear-gradient(90deg,#e91e8c 0%,#a855f7 38%,#6366f1 62%,#00e5ff 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;">
                            FARM_CTL
                          </span>
                        </div>
                        <div style="color:var(--cyberdeck-text-dim);font-size:9px;letter-spacing:1px;
                                    margin-top:3px;">${ts}</div>
                      </div>
                      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;
                                  flex:0 1 auto;margin-left:auto;padding-top:4px;">
                        <span style="display:inline-block;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:600;
                                     letter-spacing:1.5px;padding:4px 12px;border-radius:6px;line-height:1.2;
                                     border:1px solid rgba(0,255,136,0.75);color:var(--cyberdeck-green);
                                     background:rgba(0,255,136,0.07);box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),inset 0 0 14px rgba(0,255,136,0.05);">${count} UP</span>
                        <span style="display:inline-block;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:600;
                                     letter-spacing:1.5px;padding:4px 12px;border-radius:6px;line-height:1.2;
                                     border:1px solid rgba(0,229,255,0.75);color:var(--cyberdeck-cyan);
                                     background:rgba(0,229,255,0.07);box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),inset 0 0 14px rgba(0,229,255,0.05);">LINK OK</span>
                      </div>
                    </div>`;
                ]]]
            styles:
              card:
                - background: "var(--cyberdeck-bg)"
