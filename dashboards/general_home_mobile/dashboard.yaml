                backdrop-filter: blur({{ blur }}px) saturate(1.2);
                -webkit-backdrop-filter: blur({{ blur }}px) saturate(1.2);
                {% endif %}
              }
            }
          hui-vertical-stack-card$: |
            #root > * {
              margin: 0 !important;
              --ha-card-border-width: 0 !important;
            }
      cards:
      - type: custom:weather-forecast-card
        entity: weather.forecast_home
        name: Home
        default_forecast: hourly
        current:
          temperature_entity: sensor.<entity_10>_temperature
          temperature_precision: 0
          show_attributes:
          - name: apparent_temperature
            entity: sensor.<entity_10>_feels_like
        forecast:
          mode: chart
          extra_attribute: wind_bearing
          hourly_group_size: 2
        card_mod:
          style:
            .: |
              ha-card {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
              }
            $: |
              .wfc-current-secondary-info {
                display: none !important;
              }
              .wfc-current-attribute:nth-child(1) .wfc-current-attribute-name {
                font-size: 0;
              }
              .wfc-current-attribute:nth-child(1) .wfc-current-attribute-name::after {
                content: "Feels Like";
                font-size: var(--ha-font-size-m, 14px);
              }
              .wfc-current-weather {
                background: rgba(var(--rgb-primary-text-color), 0.05);
                margin: -16px -16px 0;
                padding: 12px 16px 4px;
              }
      - type: custom:apexcharts-card
        header:
          show: true
          title: Absolute humidity
          show_states: true
        graph_span: 24h
        span:
          end: hour
        yaxis:
        - min: 0
          max: 20
          decimals: 0
          apex_config:
            tickAmount: 4
        apex_config:
          chart:
            height: 130
          stroke:
            curve: smooth
            width: 2
          fill:
            type: gradient
            gradient:
              opacityFrom: 0.45
              opacityTo: 0.05
          grid:
            show: true
            borderColor: rgba(128, 128, 128, 0.2)
          legend:
            show: false
          xaxis:
            type: datetime
            tickAmount: 5
            labels:
              showDuplicates: false
              formatter: |
                EVAL:function(val, timestamp, opts) {
                  const i = opts.i;
                  const n = opts.w.globals.labels.length;
                  const step = Math.max(1, Math.round((n - 1) / 5));
                  if (i % step !== 0 && i !== n - 1) return '';
                  return new Date(val).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    hour12: true,
                  });
                }
          yaxis:
            labels:
              show: true
        series:
        - entity: sensor.backyard_absolute_humidity
          name: Absolute humidity
          type: area
          show:
            name_in_header: false
          group_by:
            func: avg
            duration: 1h
        card_mod:
          style:
            .: |
              {% if is_state('input_select.theme_style_<entity_2>', 'Neon') or is_state('input_select.theme_style_<entity_1>', 'Neon') %}
