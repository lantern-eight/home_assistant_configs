x-theme-view-style: ''
x-theme-bg-card: &id001
  type: markdown
  content: ' '
  card_mod:
    style: |
      :host {
        position: fixed !important;
        inset: 0 !important;
        z-index: -1 !important;
        pointer-events: none !important;
        padding: 0 !important;
        margin: 0 !important;
        height: 0 !important;
        min-height: 0 !important;
        overflow: visible !important;
      }
      ha-card {
        position: fixed !important;
        inset: 0 !important;
        border: none !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        min-height: 0 !important;
        padding: 0 !important;
        pointer-events: none !important;
      }
      ha-card ha-markdown { display: none !important; }
      @media (prefers-color-scheme: dark) {
        ha-card {
          background: {{ states('sensor.theme_dark_lovelace_background') }} !important;
        }
        {% if is_state('sensor.theme_dark_glow_active', 'on') %}
        ha-card::after {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          background:
            radial-gradient(140% 120% at 108% -8%, {{ states('sensor.theme_dark_glow_1') }} 0%, transparent 62%),
            radial-gradient(130% 116% at -8% 108%, {{ states('sensor.theme_dark_glow_2') }} 0%, transparent 62%),
            radial-gradient(125% 112% at 50% 132%, {{ states('sensor.theme_dark_glow_3') }} 0%, transparent 66%);
          mix-blend-mode: screen;
          opacity: 1;
        }
        {% endif %}
      }
      @media (prefers-color-scheme: light) {
        ha-card {
          background: {{ states('sensor.theme_light_lovelace_background') }} !important;
        }
        {% if is_state('sensor.theme_light_glow_active', 'on') %}
        ha-card::after {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          background:
            radial-gradient(140% 120% at 108% -8%, {{ states('sensor.theme_light_glow_1') }} 0%, transparent 62%),
            radial-gradient(130% 116% at -8% 108%, {{ states('sensor.theme_light_glow_2') }} 0%, transparent 62%),
            radial-gradient(125% 112% at 50% 132%, {{ states('sensor.theme_light_glow_3') }} 0%, transparent 66%);
          mix-blend-mode: multiply;
          opacity: 0.85;
        }
        {% endif %}
      }
x-theme-card-style: |
  {% if is_state('input_select.theme_style_<entity_2>', 'Neon') or is_state('input_select.theme_style_<entity_1>', 'Neon') %}
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  {% endif %}
  @media (prefers-color-scheme: dark) {
    ha-card {
      --primary-color: {{ states('sensor.theme_dark_primary') }};
      --accent-color: {{ states('sensor.theme_dark_accent') }};
      --state-on-color: {{ states('sensor.theme_dark_state_on') }};
      --state-off-color: {{ states('sensor.theme_dark_state_off') }};
      --success-color: {{ states('sensor.theme_dark_success') }};
      --warning-color: {{ states('sensor.theme_dark_warning') }};
      --error-color: {{ states('sensor.theme_dark_error') }};
      --info-color: {{ states('sensor.theme_dark_info') }};
      border-radius: {{ states('sensor.theme_dark_card_radius') }} !important;
      font-family: {{ states('sensor.theme_dark_card_font') }} !important;
      position: relative;
      overflow: hidden;
      background: {{ states('sensor.theme_dark_card_background') }} !important;
      border: {{ states('sensor.theme_dark_card_border') }} !important;
      box-shadow: {{ states('sensor.theme_dark_card_shadow') }} !important;
      {% set blur = states('sensor.theme_dark_card_blur') | int(0) %}
      {% if blur > 0 %}
      backdrop-filter: blur({{ blur }}px) saturate(1.2);
      -webkit-backdrop-filter: blur({{ blur }}px) saturate(1.2);
      {% endif %}
    }
  }
  @media (prefers-color-scheme: light) {
    ha-card {
      --primary-color: {{ states('sensor.theme_light_primary') }};
      --accent-color: {{ states('sensor.theme_light_accent') }};
      --state-on-color: {{ states('sensor.theme_light_state_on') }};
      --state-off-color: {{ states('sensor.theme_light_state_off') }};
      --success-color: {{ states('sensor.theme_light_success') }};
      --warning-color: {{ states('sensor.theme_light_warning') }};
      --error-color: {{ states('sensor.theme_light_error') }};
      --info-color: {{ states('sensor.theme_light_info') }};
      border-radius: {{ states('sensor.theme_light_card_radius') }} !important;
      font-family: {{ states('sensor.theme_light_card_font') }} !important;
      position: relative;
      overflow: hidden;
      background: {{ states('sensor.theme_light_card_background') }} !important;
      border: {{ states('sensor.theme_light_card_border') }} !important;
      box-shadow: {{ states('sensor.theme_light_card_shadow') }} !important;
      {% set blur = states('sensor.theme_light_card_blur') | int(0) %}
      {% if blur > 0 %}
      backdrop-filter: blur({{ blur }}px) saturate(1.2);
      -webkit-backdrop-filter: blur({{ blur }}px) saturate(1.2);
      {% endif %}
    }
  }
x-theme-exempt-style: |
  ha-card {
    background: none !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    box-shadow: none !important;
    border: none !important;
  }
  ha-card::before {
    content: none !important;
  }
x-theme-card-transparent: |
  ha-card {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }
x-theme-chrome-style: |
  {% if is_state('input_select.theme_style_<entity_2>', 'Neon') or is_state('input_select.theme_style_<entity_1>', 'Neon') %}
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  {% endif %}
  @media (prefers-color-scheme: dark) {
    ha-card {
      --primary-color: {{ states('sensor.theme_dark_primary') }};
      --accent-color: {{ states('sensor.theme_dark_accent') }};
      border-radius: {{ states('sensor.theme_dark_card_radius') }} !important;
      font-family: {{ states('sensor.theme_dark_card_font') }} !important;
      position: relative;
      overflow: hidden;
      background: color-mix(in srgb, {{ states('sensor.theme_dark_primary') }} 14%, {{ states('sensor.theme_dark_card_background') }}) !important;
      border: {{ states('sensor.theme_dark_card_border') }} !important;
      box-shadow: {{ states('sensor.theme_dark_card_shadow') }} !important;
      {% set blur = states('sensor.theme_dark_card_blur') | int(0) %}
      {% if blur > 0 %}
      backdrop-filter: blur({{ (blur * 0.4) | round(0) | int }}px) saturate(1.2);
      -webkit-backdrop-filter: blur({{ (blur * 0.4) | round(0) | int }}px) saturate(1.2);
      {% endif %}
    }
  }
  @media (prefers-color-scheme: light) {
    ha-card {
      --primary-color: {{ states('sensor.theme_light_primary') }};
      --accent-color: {{ states('sensor.theme_light_accent') }};
      border-radius: {{ states('sensor.theme_light_card_radius') }} !important;
      font-family: {{ states('sensor.theme_light_card_font') }} !important;
      position: relative;
      overflow: hidden;
      background: color-mix(in srgb, {{ states('sensor.theme_light_primary') }} 14%, {{ states('sensor.theme_light_card_background') }}) !important;
      border: {{ states('sensor.theme_light_card_border') }} !important;
      box-shadow: {{ states('sensor.theme_light_card_shadow') }} !important;
      {% set blur = states('sensor.theme_light_card_blur') | int(0) %}
      {% if blur > 0 %}
      backdrop-filter: blur({{ (blur * 0.4) | round(0) | int }}px) saturate(1.2);
      -webkit-backdrop-filter: blur({{ (blur * 0.4) | round(0) | int }}px) saturate(1.2);
      {% endif %}
    }
  }
