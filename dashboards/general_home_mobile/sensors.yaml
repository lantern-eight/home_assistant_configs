# =============================================================================
# General Home Mobile — Template Sensors
# =============================================================================
# Synced to HA as: template_sensors/general_home_sensors.yaml
# Requires HA restart after changes.
#
# Conditional Card Priority System
# ---------------------------------
# Each conditional card has:
#   - An input_boolean (is the card's trigger condition active?)
#   - A priority (1 = highest, 100 = lowest) — evaluated dynamically
#
# The template sensor below reads all card booleans, calculates dynamic
# priorities, sorts, and outputs the top 5 as the "visible" set.
# Dashboard conditional cards check this sensor to show/hide.
#
# To add a new conditional card:
#   1. Create input_boolean.cond_<card_id> in HA helpers
#   2. Add an automation to toggle it based on conditions
#   3. Add the card entry to the `cards` list below with id, boolean, and
#      priority template
#   4. Add the conditional card in dashboard.yaml
# =============================================================================

- sensor:
    # -------------------------------------------------------------------------
    # Conditional card visibility manager
    # -------------------------------------------------------------------------
    - name: "Dashboard Conditional Visible"
      unique_id: dashboard_conditional_visible
      icon: mdi:cards
      state: >
        {% set max_visible = 5 %}
        {% set cards = [
          {
            'id': 'bedtime_doors',
            'active': is_state('input_boolean.cond_bedtime_doors', 'on'),
            'priority': 10 if (now().hour >= 22 or now().hour < 5) else 30
          },
          {
            'id': 'uv_index',
            'active': is_state('input_boolean.cond_uv_index', 'on'),
            'priority': 15 if state_attr('sensor.<entity_10>_uv_index', 'state') | float(0) >= 6 else 40
          }
        ] %}
        {% set active = cards | selectattr('active') | sort(attribute='priority') | list %}
        {{ active[:max_visible] | length }}
      attributes:
        visible_ids: >
          {% set max_visible = 5 %}
          {% set cards = [
            {
              'id': 'bedtime_doors',
              'active': is_state('input_boolean.cond_bedtime_doors', 'on'),
              'priority': 10 if (now().hour >= 22 or now().hour < 5) else 30
            },
            {
              'id': 'uv_index',
              'active': is_state('input_boolean.cond_uv_index', 'on'),
              'priority': 15 if states('sensor.<entity_10>_uv_index') | float(0) >= 6 else 40
            }
          ] %}
          {% set active = cards | selectattr('active') | sort(attribute='priority') | list %}
          {{ active[:max_visible] | map(attribute='id') | list }}
        all_cards: >
          {% set cards = [
            {
              'id': 'bedtime_doors',
              'name': 'Bedtime Doors',
              'active': is_state('input_boolean.cond_bedtime_doors', 'on'),
              'priority': 10 if (now().hour >= 22 or now().hour < 5) else 30
            },
            {
              'id': 'uv_index',
              'name': 'UV Index',
              'active': is_state('input_boolean.cond_uv_index', 'on'),
              'priority': 15 if states('sensor.<entity_10>_uv_index') | float(0) >= 6 else 40
            }
          ] %}
          {{ cards | sort(attribute='priority') }}
        active_count: >
          {{ expand('input_boolean.cond_bedtime_doors', 'input_boolean.cond_uv_index')
             | selectattr('state', 'eq', 'on') | list | length }}

# Room light toggles (Rooms pop-up)
# ---------------------------------
# Uses HA area assignments. Pop-up room → area ID (from entity discovery):
#   Living Room  → living_room   (no lights in area)
#   Basement     → basement      (printer chamber lights only)
#   Main Suite   → main_suite    (ceiling + lamps; excludes *_led presence LEDs)
#   <entity_3>'s Room → <entity_3>_s_room (no lights in area)
#   <entity_4>'s Room → <entity_4>_s_room (light.<entity_4>s_room)
#   Kitchen      → kitchen       (light.kitchen_table_light)
# <entity_11> ceiling light is in <entity_11> area (not basement pop-up).

- switch:
    - name: "Basement Lights"
      unique_id: room_lights_basement
      icon: mdi:lightbulb
      availability: >
        {{ area_entities('basement') | select('match', '^light\\.') | list | length > 0 }}
      state: >
        {{ area_entities('basement') | select('match', '^light\\.') | select('is_state', 'on') | list | length > 0 }}
      turn_on:
        - action: light.turn_on
          target:
            entity_id: "{{ area_entities('basement') | select('match', '^light\\.') | list }}"
      turn_off:
        - action: light.turn_off
          target:
            entity_id: "{{ area_entities('basement') | select('match', '^light\\.') | list }}"

    - name: "Main Suite Lights"
      unique_id: room_lights_main_suite
      icon: mdi:lightbulb
      availability: >
        {{ area_entities('main_suite') | select('match', '^light\\.') | reject('search', '_led') | list | length > 0 }}
      state: >
        {{ area_entities('main_suite') | select('match', '^light\\.') | reject('search', '_led') | select('is_state', 'on') | list | length > 0 }}
      turn_on:
        - action: light.turn_on
          target:
            entity_id: "{{ area_entities('main_suite') | select('match', '^light\\.') | reject('search', '_led') | list }}"
      turn_off:
        - action: light.turn_off
          target:
            entity_id: "{{ area_entities('main_suite') | select('match', '^light\\.') | reject('search', '_led') | list }}"

    - name: "Kitchen Lights"
      unique_id: room_lights_kitchen
      icon: mdi:lightbulb
      availability: >
        {{ area_entities('kitchen') | select('match', '^light\\.') | list | length > 0 }}
      state: >
        {{ area_entities('kitchen') | select('match', '^light\\.') | select('is_state', 'on') | list | length > 0 }}
      turn_on:
        - action: light.turn_on
          target:
            entity_id: "{{ area_entities('kitchen') | select('match', '^light\\.') | list }}"
      turn_off:
        - action: light.turn_off
          target:
            entity_id: "{{ area_entities('kitchen') | select('match', '^light\\.') | list }}"

    - name: "<entity_4>s Room Lights"
      unique_id: room_lights_<entity_4>_s_room
      icon: mdi:lightbulb
      availability: >
        {{ area_entities('<entity_4>_s_room') | select('match', '^light\\.') | list | length > 0 }}
      state: >
        {{ area_entities('<entity_4>_s_room') | select('match', '^light\\.') | select('is_state', 'on') | list | length > 0 }}
      turn_on:
        - action: light.turn_on
          target:
            entity_id: "{{ area_entities('<entity_4>_s_room') | select('match', '^light\\.') | list }}"
      turn_off:
        - action: light.turn_off
          target:
            entity_id: "{{ area_entities('<entity_4>_s_room') | select('match', '^light\\.') | list }}"

# =============================================================================
# Notification System — Dashboard Header Bar
# =============================================================================
# Aggregates transient status items into a single sensor for the notification
# header. State = total active count. Items attribute drives the dot counter
# and expanded list via button-card JS templates.
#
# State and attributes evaluate independently in HA — the item-building logic
# is intentionally present in both.
# =============================================================================

- sensor:
    - name: "Dashboard Notifications"
      unique_id: dashboard_notifications
      icon: mdi:bell
      state: >
        {% set ns = namespace(count=0) %}
        {% if is_state('binary_sensor.<entity_3>s_door_door', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% if is_state('binary_sensor.<entity_4>s_door_door', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% if is_state('binary_sensor.balrog_cleaning', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% if is_state('binary_sensor.shadowfax_cleaning', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% set lc = states.light | selectattr('state','eq','on') | rejectattr('entity_id','search','_led') | rejectattr('entity_id','search','chamber_light') | list | length %}
        {% if lc > 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% if is_state('sensor.<entity_23>_current_status', 'printing') %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% if is_state('sensor.<entity_22>_current_status', 'printing') %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% set hvac_action = state_attr('climate.living_room_thermostat', 'hvac_action') %}
        {% if hvac_action in ['heating', 'cooling'] %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% set power = states('sensor.eve_energy_20ecn4101_power_top') | float(0) %}
        {% if power > 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% set ns.count = ns.count + (states('sensor.house_nws_alerts_<entity_24>_nws_alerts_alerts') | int(0)) %}
        {{ ns.count }}
      attributes:
        items: >
          {% set ns = namespace(items=[]) %}
          {% if is_state('binary_sensor.<entity_3>s_door_door', 'on') %}
            {% set ns.items = ns.items + [{'id':'door_<entity_3>','label':"<entity_3>'s Door Open",'icon':'mdi:door-open','severity':'red','promoted':true,'sort_key':'0_door_<entity_3>'}] %}
          {% endif %}
          {% if is_state('binary_sensor.<entity_4>s_door_door', 'on') %}
            {% set ns.items = ns.items + [{'id':'door_<entity_4>','label':"<entity_4>'s Door Open",'icon':'mdi:door-open','severity':'red','promoted':true,'sort_key':'0_door_<entity_4>'}] %}
          {% endif %}
          {% set nws_alerts = state_attr('sensor.house_nws_alerts_<entity_24>_nws_alerts_alerts', 'Alerts') %}
          {% if nws_alerts is not none %}
            {% set nws_icons = {'EHW':'mdi:thermometer-alert','HTA':'mdi:thermometer-alert','XHW':'mdi:thermometer-alert','TOR':'mdi:weather-tornado','TOA':'mdi:weather-tornado','FFW':'mdi:home-flood','FFA':'mdi:home-flood','FLW':'mdi:home-flood','FLA':'mdi:home-flood','SVR':'mdi:weather-lightning','SVA':'mdi:weather-lightning','WSW':'mdi:snowflake-alert','WSA':'mdi:snowflake-alert','BZW':'mdi:snowflake-alert','WCW':'mdi:snowflake-alert','WCA':'mdi:snowflake-alert'} %}
            {% set nws_sevs = {'Extreme':'red','Severe':'amber','Moderate':'blue','Minor':'blue'} %}
            {% for alert in nws_alerts %}
              {% set code = alert.NWSCode | default('UNK') %}
              {% set end_str = (alert.Ends | default('')) or (alert.Expires | default('')) %}
              {% set end_dt = (end_str | as_datetime) if end_str else none %}
              {% set delta = (((end_dt - now()).total_seconds()) | int) if end_dt else -1 %}
              {% set d = (delta / 86400) | int %}
              {% set h = ((delta % 86400) / 3600) | int %}
              {% set m = ((delta % 3600) / 60) | int %}
              {% set tr = (d ~ 'd ' ~ h ~ 'h left') if d > 0 else ((h ~ 'h ' ~ m ~ 'm left') if h > 0 else (m ~ 'm left')) %}
              {% set tr = tr if delta > 0 else '' %}
              {% set icon = nws_icons[code] if code in nws_icons else 'mdi:weather-lightning-rainy' %}
              {% set sev = nws_sevs[alert.Severity] if alert.Severity is defined and alert.Severity in nws_sevs else 'blue' %}
              {% set ns.items = ns.items + [{'id':'nws_'~code~'_'~loop.index,'label':alert.Event|default('Weather Alert'),'icon':icon,'severity':sev,'promoted':false,'sort_key':'0_weather_'~code,'time_remaining':tr}] %}
            {% endfor %}
          {% endif %}
          {% if is_state('binary_sensor.balrog_cleaning', 'on') %}
            {% set prog = states('sensor.balrog_cleaning_progress') | float(0) | round(0) | int %}
            {% set ns.items = ns.items + [{'id':'vacuum_balrog','label':'Downstairs Vacuum','icon':'mdi:robot-vacuum','severity':'amber','promoted':false,'sort_key':'1_vacuum_balrog','progress':prog}] %}
          {% endif %}
          {% if is_state('binary_sensor.shadowfax_cleaning', 'on') %}
            {% set prog = states('sensor.shadowfax_cleaning_progress') | float(0) | round(0) | int %}
            {% set ns.items = ns.items + [{'id':'vacuum_shadowfax','label':'Upstairs Vacuum','icon':'mdi:robot-vacuum','severity':'amber','promoted':false,'sort_key':'1_vacuum_shadowfax','progress':prog}] %}
          {% endif %}
          {% set lc = states.light | selectattr('state','eq','on') | rejectattr('entity_id','search','_led') | rejectattr('entity_id','search','chamber_light') | list | length %}
          {% if lc > 0 %}
            {% set ns.items = ns.items + [{'id':'lights','label':lc ~ ' Light' ~ ('s' if lc != 1 else '') ~ ' On','icon':'mdi:lightbulb-group','severity':'blue','promoted':false,'sort_key':'2_lights'}] %}
          {% endif %}
          {% if is_state('sensor.<entity_23>_current_status', 'printing') %}
            {% set prog = states('sensor.<entity_23>_percent_complete') | float(0) | round(0) | int %}
            {% set raw_min = states('sensor.<entity_23>_remaining_print_time') | float(0) %}
            {% set hrs = (raw_min / 60) | int %}
            {% set mins = (raw_min % 60) | int %}
            {% set tr = (hrs ~ 'h ' ~ mins ~ 'm left') if hrs > 0 else (mins ~ 'm left') %}
            {% set ns.items = ns.items + [{'id':'printer_<entity_20>','label':'<entity_20> 3D Printer','icon':'mdi:printer-3d','severity':'green','promoted':false,'sort_key':'3_printer_<entity_20>','progress':prog,'time_remaining':tr}] %}
          {% endif %}
          {% if is_state('sensor.<entity_22>_current_status', 'printing') %}
            {% set prog = states('sensor.<entity_22>_percent_complete') | float(0) | round(0) | int %}
            {% set raw_min = states('sensor.<entity_22>_remaining_print_time') | float(0) %}
            {% set hrs = (raw_min / 60) | int %}
            {% set mins = (raw_min % 60) | int %}
            {% set tr = (hrs ~ 'h ' ~ mins ~ 'm left') if hrs > 0 else (mins ~ 'm left') %}
            {% set ns.items = ns.items + [{'id':'printer_<entity_21>','label':'<entity_21> 3D Printer','icon':'mdi:printer-3d','severity':'green','promoted':false,'sort_key':'3_printer_<entity_21>','progress':prog,'time_remaining':tr}] %}
          {% endif %}
          {% set hvac_action = state_attr('climate.living_room_thermostat', 'hvac_action') %}
          {% if hvac_action in ['heating', 'cooling'] %}
            {% set ns.items = ns.items + [{'id':'hvac','label':hvac_action | title,'icon':'mdi:thermostat','severity':'green','promoted':false,'sort_key':'3_hvac'}] %}
          {% endif %}
          {% set power = states('sensor.eve_energy_20ecn4101_power_top') | float(0) %}
          {% if power > 0 %}
            {% set ns.items = ns.items + [{'id':'power','label':(power | round(0) | int | string) ~ 'W','icon':'mdi:flash','severity':'green','promoted':false,'sort_key':'3_power'}] %}
          {% endif %}
          {{ ns.items | sort(attribute='sort_key') }}
        promoted_count: >
          {% set ns = namespace(count=0) %}
          {% if is_state('binary_sensor.<entity_3>s_door_door', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if is_state('binary_sensor.<entity_4>s_door_door', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {{ ns.count }}
        dot_count: >
          {% set ns = namespace(count=0) %}
          {% if is_state('binary_sensor.balrog_cleaning', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if is_state('binary_sensor.shadowfax_cleaning', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set lc = states.light | selectattr('state','eq','on') | rejectattr('entity_id','search','_led') | rejectattr('entity_id','search','chamber_light') | list | length %}
          {% if lc > 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if is_state('sensor.<entity_23>_current_status', 'printing') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if is_state('sensor.<entity_22>_current_status', 'printing') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set hvac_action = state_attr('climate.living_room_thermostat', 'hvac_action') %}
          {% if hvac_action in ['heating', 'cooling'] %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set power = states('sensor.eve_energy_20ecn4101_power_top') | float(0) %}
          {% if power > 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set ns.count = ns.count + (states('sensor.house_nws_alerts_<entity_24>_nws_alerts_alerts') | int(0)) %}
          {{ ns.count }}
        red_count: >
          {% set ns = namespace(count=0) %}
          {% set nws_alerts = state_attr('sensor.house_nws_alerts_<entity_24>_nws_alerts_alerts', 'Alerts') %}
          {% if nws_alerts is not none %}
            {% for alert in nws_alerts %}
              {% if alert.Severity is defined and alert.Severity == 'Extreme' %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.count }}
        amber_count: >
          {% set ns = namespace(count=0) %}
          {% if is_state('binary_sensor.balrog_cleaning', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if is_state('binary_sensor.shadowfax_cleaning', 'on') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set nws_alerts = state_attr('sensor.house_nws_alerts_<entity_24>_nws_alerts_alerts', 'Alerts') %}
          {% if nws_alerts is not none %}
            {% for alert in nws_alerts %}
              {% if alert.Severity is defined and alert.Severity == 'Severe' %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.count }}
        blue_count: >
          {% set ns = namespace(count=0) %}
          {% set lc = states.light | selectattr('state','eq','on') | rejectattr('entity_id','search','_led') | rejectattr('entity_id','search','chamber_light') | list | length %}
          {% if lc > 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set nws_alerts = state_attr('sensor.house_nws_alerts_<entity_24>_nws_alerts_alerts', 'Alerts') %}
          {% if nws_alerts is not none %}
            {% for alert in nws_alerts %}
              {% set sev = alert.Severity | default('') %}
              {% if sev not in ['Extreme', 'Severe'] %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.count }}
        green_count: >
          {% set ns = namespace(count=0) %}
          {% if is_state('sensor.<entity_23>_current_status', 'printing') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if is_state('sensor.<entity_22>_current_status', 'printing') %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set hvac_action = state_attr('climate.living_room_thermostat', 'hvac_action') %}
          {% if hvac_action in ['heating', 'cooling'] %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% set power = states('sensor.eve_energy_20ecn4101_power_top') | float(0) %}
          {% if power > 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {{ ns.count }}
