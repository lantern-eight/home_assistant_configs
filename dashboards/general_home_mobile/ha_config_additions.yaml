# =============================================================================
# HA configuration.yaml additions for the General Home Mobile dashboard
# =============================================================================
# Copy these blocks into your HA configuration.yaml, then restart.
# Most config is in the general_home_mobile.yaml package — only items that
# can't live in a package remain here.
# =============================================================================

# --- 1. Dashboard registration ---
# Add under the existing `lovelace: dashboards:` block:
#
# lovelace:
#   mode: storage
#   dashboards:
#     general-home:
#       mode: yaml
#       title: Home
#       icon: mdi:home
#       show_in_sidebar: true
#       filename: dashboards/general_home_mobile/dashboard.yaml

# --- 2. Template sensors ---
# Already handled by the existing include in configuration.yaml:
#   template: !include_dir_merge_list template_sensors
# Just sync sensors.yaml → template_sensors/general_home_sensors.yaml

# --- 3. Package include ---
# Helpers, REST sensor, command_line sensor, shell_command, and
# automations are all defined in general_home_mobile.yaml and synced
# to packages/general_home_mobile.yaml. The HA configuration.yaml should
# have a line to include packages/*.yaml:
# packages: !include_dir_named packages

# --- 4. Secrets ---
# The package REST sensor uses !secret openmeteo_uv_url. Add to secrets.yaml:
#   openmeteo_uv_url: "https://api.open-meteo.com/v1/forecast?latitude=LAT&longitude=LON&hourly=uv_index&timezone=TIMEZONE&forecast_days=1"
#   Replace LAT, LON, and TIMEZONE with your actual values.

# --- 5. Frontend module ---
# card_mod must load via extra_module_url (not just a Lovelace resource):
#
# frontend:
#   extra_module_url:
#     - /hacsfiles/lovelace-card-mod/card-mod.js
