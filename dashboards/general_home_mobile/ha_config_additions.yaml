# =============================================================================
# HA configuration.yaml additions for the General Home Mobile dashboard
# =============================================================================
# Merge these blocks into your HA configuration.yaml, then restart.
# =============================================================================

# --- 1. Dashboard registration ---
# Add under the existing `lovelace: dashboards:` block:
#
# lovelace:
#   mode: storage
#   dashboards:
#     cyber-deck:                          # (existing)
#       ...
#     general-home:                        # <-- ADD THIS
#       mode: yaml
#       title: Home
#       icon: mdi:home
#       show_in_sidebar: true
#       filename: dashboards/general_home_mobile/dashboard.yaml

# --- 2. Template sensors ---
# Already handled by the existing include in configuration.yaml:
#   template: !include_dir_merge_list template_sensors
# Just sync sensors.yaml → template_sensors/general_home_sensors.yaml

# --- 3. REST sensor for UV forecast ---
# Add at the top level of configuration.yaml:
#
# rest:
#   - resource: !secret openmeteo_uv_url
#     scan_interval: 86400
#     sensor:
#       - name: "OpenMeteo Hourly UV Forecast"
#         unique_id: openmeteo_hourly_uv_forecast
#         value_template: "{{ value_json.hourly.uv_index | max | round(1) }}"
#         unit_of_measurement: "UV index"
#         icon: mdi:sun-wireless
#         json_attributes_path: "$.hourly"
#         json_attributes:
#           - time
#           - uv_index
#
# And in secrets.yaml:
#   openmeteo_uv_url: "https://api.open-meteo.com/v1/forecast?latitude=LAT&longitude=LON&hourly=uv_index&timezone=TIMEZONE&forecast_days=1"
#   - Replace LAT, LON, and TIMEZONE with your actual values in the secrets.yaml file.
#   - Chart span limits display to 7 AM–7 PM; do not use start_hour/end_hour — OpenMeteo returns HTTP 400.
#

# --- 4. Input boolean helpers ---
# Create in Settings > Devices & Services > Helpers, or add to configuration.yaml:
