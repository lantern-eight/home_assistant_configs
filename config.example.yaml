# Copy to config.yaml and fill in real values.
# config.yaml is gitignored and cursorignored.

smb_server: "192.168.1.100" 
smb_share: "config"
smb_path: "" # path within share, optional
smb_user: ""
smb_password: ""

# Strings to redact from backups (case-insensitive)
# Replaces with <entity_N> placeholders
redact_entities:
  - "Alice"
  - "Bob"

token: "your_token_here"

# HA base URL (optional — defaults to http://homeassistant.local:8123)
# ha_base_url: "http://homeassistant.local:8123"