
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  # Load card-mod as a frontend module BEFORE lovelace renders any cards, so it
  # patches all card classes up front. Without this, card-mod loads as a late
  # lovelace resource and intermittently misses cards (markdown/navbar/calendar
  # cards were not getting themed). The whole theme system relies on card-level
  # card_mod applying to every card, so this must be reliable.
  extra_module_url:
    - /hacsfiles/lovelace-card-mod/card-mod.js

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Dashboards
lovelace:
  mode: storage
  dashboards:
    # Cyberdeck printer farm dashboard (YAML mode)
    cyber-deck:
      mode: yaml
      title: Farm Control
      icon: mdi:printer-3d
      show_in_sidebar: true
      filename: dashboards/cyberdeck/dashboard.yaml
    # General Home Mobile dashboard (YAML mode)
    general-home:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/general_home_mobile/dashboard.yaml

# ---------------------------
# Custom added by me below this line
# ---------------------------

template: !include_dir_merge_list template_sensors

# Notification group for phones
notify:
  - name: boss_phones
    platform: group
    services:
      - service: mobile_app_<entity_9>
      - service: mobile_app_<entity_7>

# Thermal Comfort - dew point, heat index, humidex, etc.
# https://github.com/dolezsa/thermal_comfort
# Each entry needs a temp + humidity sensor pair from the same location.
thermal_comfort:
  - custom_icons: true
    sensor:
      - name: Basement
        temperature_sensor: sensor.basement_temperature
        humidity_sensor: sensor.basement_humidity
        unique_id: F45...D28
      - name: Living Room
        temperature_sensor: sensor.living_room_thermostat_current_temperature
        humidity_sensor: sensor.living_room_thermostat_current_humidity
        unique_id: F47...8E7
      - name: Main Suite
        temperature_sensor: sensor.everything_presence_one_601670_temperature
        humidity_sensor: sensor.everything_presence_one_601670_humidity
        unique_id: BCA...984
      - name: Backyard
        temperature_sensor: sensor.<entity_10>_temperature
        humidity_sensor: sensor.<entity_10>_humidity
        unique_id: F50...433

# Spoolman
rest_command:
  spoolman_find_spools_by_name:
    url: "http://<entity_12>/api/v1/spool?filament.name={{ filament_name | urlencode }}&allow_archived=false"
    method: GET
    content_type: "application/json"

# =============================================================================
# HA configuration.yaml additions for the General Home Mobile dashboard
# =============================================================================
# Merge these blocks into your HA configuration.yaml, then restart.
# =============================================================================

# --- 3. REST sensor for UV forecast ---
rest:
  - resource: !secret openmeteo_uv_url
    scan_interval: 86400
    sensor:
      - name: "OpenMeteo Hourly UV Forecast"
        unique_id: openmeteo_hourly_uv_forecast
        value_template: "{{ value_json.hourly.uv_index | max | round(1) }}"
        unit_of_measurement: "UV index"
        icon: mdi:sun-wireless
        json_attributes_path: "$.hourly"
        json_attributes:
          - time
          - uv_index

# --- 4. Input boolean helpers ---
# Create in Settings > Devices & Services > Helpers, or add to configuration.yaml:
#
input_boolean:
  cond_bedtime_doors:
    name: "Conditional: Bedtime Doors"
    icon: mdi:door-open
  cond_uv_index:
    name: "Conditional: UV Index"
    icon: mdi:weather-sunny-alert


# --- Theme system (General Home Mobile) ---
input_select:
  theme_appearance_user:
    name: "Theme Appearance User"
    options:
      - "<entity_1>"
      - "<entity_2>"
    initial: "<entity_1>"
    icon: mdi:account-switch
  theme_style_<entity_1>:
    name: "Theme Style (<entity_1>)"
    options:
      - Clean
      - Glass
      - Dark
      - Glow
      - Neon
    initial: Clean
    icon: mdi:palette-swatch-variant
  theme_style_<entity_2>:
    name: "Theme Style (<entity_2>)"
    options:
      - Clean
      - Glass
      - Dark
      - Glow
      - Neon
    initial: Clean
    icon: mdi:palette-swatch-variant
  theme_palette_<entity_1>:
    name: "Theme Palette (<entity_1>)"
    options:
      - Indigo
      - Ocean
      - Sunset
      - Forest
      - Rose
      - Mono
      - Cyberdeck
      - Mint
    initial: Indigo
    icon: mdi:palette
  theme_palette_<entity_2>:
    name: "Theme Palette (<entity_2>)"
    options:
      - Indigo
      - Ocean
      - Sunset
      - Forest
      - Rose
      - Mono
      - Cyberdeck
      - Mint
    initial: Indigo
    icon: mdi:palette

input_text:
  theme_background_<entity_1>:
    name: "Theme Background (<entity_1>)"
    initial: "none"
    max: 255
    icon: mdi:image
  theme_background_<entity_2>:
    name: "Theme Background (<entity_2>)"
    initial: "none"
    max: 255
    icon: mdi:image

input_number:
  theme_card_opacity_<entity_1>:
    name: "theme_card_opacity_<entity_1>"
    min: -1
    max: 100
    step: 5
    initial: -1
    icon: mdi:opacity
    unit_of_measurement: "%"
    mode: slider
  theme_card_opacity_<entity_2>:
    name: "theme_card_opacity_<entity_2>"
    min: -1
    max: 100
    step: 5
    initial: -1
    icon: mdi:opacity
    unit_of_measurement: "%"
    mode: slider
  theme_card_blur_<entity_1>:
    name: "theme_card_blur_<entity_1>"
    min: -1
    max: 30
    step: 1
    initial: -1
    icon: mdi:blur
    unit_of_measurement: "px"
    mode: slider
  theme_card_blur_<entity_2>:
    name: "theme_card_blur_<entity_2>"
    min: -1
    max: 30
    step: 1
    initial: -1
    icon: mdi:blur
    unit_of_measurement: "px"
    mode: slider

command_line:
  - sensor:
      name: theme backgrounds
      command: >
        python3 /config/scripts/list_theme_backgrounds.py
      scan_interval: 30
      value_template: "{{ value_json.count | int(0) }}"
      json_attributes:
        - count
        - file_list

shell_command:
  generate_theme_thumbnails: "python3 /config/scripts/generate_theme_thumbnails.py"
