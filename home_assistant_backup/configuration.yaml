
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Dashboards
lovelace:
  mode: storage
  dashboards:
    # Cyberdeck printer farm dashboard (YAML mode)
    cyber-deck:
      mode: yaml
      title: Farm Control
      icon: mdi:printer-3d
      show_in_sidebar: true
      filename: dashboards/cyberdeck/dashboard.yaml
    # General Home Mobile dashboard (YAML mode)
    general-home:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/general_home_mobile/dashboard.yaml

# ---------------------------
# Custom added by me below this line
# ---------------------------

template: !include_dir_merge_list template_sensors

# Notification group for phones
notify:
  - name: boss_phones
    platform: group
    services:
      - service: mobile_app_<entity_9>
      - service: mobile_app_<entity_7>

# Thermal Comfort - dew point, heat index, humidex, etc.
# https://github.com/dolezsa/thermal_comfort
# Each entry needs a temp + humidity sensor pair from the same location.
thermal_comfort:
  - custom_icons: true
    sensor:
      - name: Basement
        temperature_sensor: sensor.basement_temperature
        humidity_sensor: sensor.basement_humidity
        unique_id: F45...D28
      - name: Living Room
        temperature_sensor: sensor.living_room_thermostat_current_temperature
        humidity_sensor: sensor.living_room_thermostat_current_humidity
        unique_id: F47...8E7
      - name: Main Suite
        temperature_sensor: sensor.everything_presence_one_601670_temperature
        humidity_sensor: sensor.everything_presence_one_601670_humidity
        unique_id: BCA...984
      - name: Backyard
        temperature_sensor: sensor.<entity_10>_temperature
        humidity_sensor: sensor.<entity_10>_humidity
        unique_id: F50...433

# Spoolman
rest_command:
  spoolman_find_spools_by_name:
    url: "http://<entity_12>/api/v1/spool?filament.name={{ filament_name | urlencode }}&allow_archived=false"
    method: GET
    content_type: "application/json"

# =============================================================================
# HA configuration.yaml additions for the General Home Mobile dashboard
# =============================================================================
# Merge these blocks into your HA configuration.yaml, then restart.
# =============================================================================

# --- 3. REST sensor for UV forecast ---
rest:
  - resource: !secret openmeteo_uv_url
    scan_interval: 86400
    sensor:
      - name: "OpenMeteo Hourly UV Forecast"
        unique_id: openmeteo_hourly_uv_forecast
        value_template: "{{ value_json.hourly.uv_index | max | round(1) }}"
        unit_of_measurement: "UV index"
        icon: mdi:sun-wireless
        json_attributes_path: "$.hourly"
        json_attributes:
          - time
          - uv_index

# --- 4. Input boolean helpers ---
# Create in Settings > Devices & Services > Helpers, or add to configuration.yaml:
#
input_boolean:
  cond_bedtime_doors:
    name: "Conditional: Bedtime Doors"
    icon: mdi:door-open
  cond_uv_index:
    name: "Conditional: UV Index"
    icon: mdi:weather-sunny-alert
