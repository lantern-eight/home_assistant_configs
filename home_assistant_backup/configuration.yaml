
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  # Load card-mod as a frontend module BEFORE lovelace renders any cards, so it
  # patches all card classes up front. Without this, card-mod loads as a late
  # lovelace resource and intermittently misses cards (markdown/navbar/calendar
  # cards were not getting themed). The whole theme system relies on card-level
  # card_mod applying to every card, so this must be reliable.
  extra_module_url:
    - /hacsfiles/lovelace-card-mod/card-mod.js
    - /local/popup_history_fix.js

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Dashboards
lovelace:
  mode: storage
  dashboards:
    # Cyberdeck printer farm dashboard (YAML mode)
    cyber-deck:
      mode: yaml
      title: Farm Control
      icon: mdi:printer-3d
      show_in_sidebar: true
      filename: dashboards/cyberdeck/dashboard.yaml
    # General Home Mobile dashboard (YAML mode)
    general-home:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/general_home_mobile/dashboard.yaml

template: !include_dir_merge_list template_sensors

# HA packages — every yaml file in packages/ loads as its own package
homeassistant:
  packages: !include_dir_named packages
