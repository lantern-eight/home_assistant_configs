
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Cyberdeck printer farm dashboard (YAML mode)
lovelace:
  mode: storage
  dashboards:
    cyber-deck:
      mode: yaml
      title: Farm Control
      icon: mdi:printer-3d
      show_in_sidebar: true
      filename: dashboards/cyberdeck/dashboard.yaml

# ---------------------------
# Custom added by me below this line
# ---------------------------

template: !include_dir_merge_list template_sensors

# Notification group for phones
notify:
  - name: boss_phones
    platform: group
    services:
      - service: mobile_app_<entity_9>
      - service: mobile_app_<entity_7>

# Spoolman
rest_command:
  spoolman_find_spools_by_name:
    url: "http://<entity_12>/api/v1/spool?filament.name={{ filament_name | urlencode }}&allow_archived=false"
    method: GET
    content_type: "application/json"