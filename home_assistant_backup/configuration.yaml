
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  # Load card-mod as a frontend module BEFORE lovelace renders any cards, so it
  # patches all card classes up front. Without this, card-mod loads as a late
  # lovelace resource and intermittently misses cards (markdown/navbar/calendar
  # cards were not getting themed). The whole theme system relies on card-level
  # card_mod applying to every card, so this must be reliable.
  extra_module_url:
    - /hacsfiles/lovelace-card-mod/card-mod.js
    - /local/popup_history_fix.js

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Dashboards
lovelace:
  mode: storage
  dashboards:
    # Cyberdeck printer farm dashboard (YAML mode)
    cyber-deck:
      mode: yaml
      title: Farm Control
      icon: mdi:printer-3d
      show_in_sidebar: true
      filename: dashboards/cyberdeck/dashboard.yaml
    # General Home Mobile dashboard (YAML mode)
    general-home:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/general_home_mobile/dashboard.yaml

# ---------------------------
# Custom added by me below this line
# ---------------------------

template: !include_dir_merge_list template_sensors

# Notification group for phones
notify:
  - name: boss_phones
    platform: group
    services:
      - service: mobile_app_<entity_9>
      - service: mobile_app_<entity_7>

# Thermal Comfort - dew point, heat index, humidex, etc.
# https://github.com/dolezsa/thermal_comfort
# Each entry needs a temp + humidity sensor pair from the same location.
thermal_comfort:
  - custom_icons: true
    sensor:
      - name: Basement
        temperature_sensor: sensor.basement_temperature
        humidity_sensor: sensor.basement_humidity
        unique_id: F45...D28
      - name: Living Room
        temperature_sensor: sensor.living_room_thermostat_current_temperature
        humidity_sensor: sensor.living_room_thermostat_current_humidity
        unique_id: F47...8E7
      - name: Main Suite
        temperature_sensor: sensor.everything_presence_one_601670_temperature
        humidity_sensor: sensor.everything_presence_one_601670_humidity
        unique_id: BCA...984
      - name: Backyard
        temperature_sensor: sensor.<entity_10>_temperature
        humidity_sensor: sensor.<entity_10>_humidity
        unique_id: F50...433

# Spoolman
rest_command:
  spoolman_find_spools_by_name:
    url: "http://<entity_12>/api/v1/spool?filament.name={{ filament_name | urlencode }}&allow_archived=false"
    method: GET
    content_type: "application/json"

# General Home Mobile — all helpers, sensors, automations in one package
homeassistant:
  packages:
    general_home_mobile: !include packages/general_home_mobile.yaml
