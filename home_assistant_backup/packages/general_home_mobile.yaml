# =============================================================================
# General Home Mobile — HA Package
# =============================================================================
# Synced to HA as: packages/general_home_mobile.yaml
# Requires HA restart after changes (packages can't hot-reload).
#
# Include in configuration.yaml:
#   homeassistant:
#     packages:
#       general_home_mobile: !include packages/general_home_mobile.yaml
#
# No `initial:` on any helper — values persist across restarts.
#
# Categories and labels are defined in registry_metadata.yaml and
# applied by the sync script via WebSocket (-c flag).
# =============================================================================

# --- Conditional card toggles ---

input_boolean:
  cond_bedtime_doors:
    name: "Conditional: Bedtime Doors"
    icon: mdi:door-open
  cond_uv_index:
    name: "Conditional: UV Index"
    icon: mdi:weather-sunny-alert
  notification_expanded:
    name: "Notification Tray Expanded"
    icon: mdi:chevron-down

# --- Theme system ---

input_select:
  theme_appearance_user:
    name: "Theme Appearance User"
    options:
      - "<entity_1>"
      - "<entity_2>"
    icon: mdi:account-switch
  theme_style_<entity_1>:
    name: "Theme Style (<entity_1>)"
    options:
      - Clean
      - Glass
      - Dark
      - Glow
      - Neon
    icon: mdi:palette-swatch-variant
  theme_style_<entity_2>:
    name: "Theme Style (<entity_2>)"
    options:
      - Clean
      - Glass
      - Dark
      - Glow
      - Neon
    icon: mdi:palette-swatch-variant
  theme_palette_<entity_1>:
    name: "Theme Palette (<entity_1>)"
    options:
      - Indigo
      - Ocean
      - Sunset
      - Forest
      - Rose
      - Mono
      - Cyberdeck
      - Mint
    icon: mdi:palette
  theme_palette_<entity_2>:
    name: "Theme Palette (<entity_2>)"
    options:
      - Indigo
      - Ocean
      - Sunset
      - Forest
      - Rose
      - Mono
      - Cyberdeck
      - Mint
    icon: mdi:palette

input_text:
  theme_background_<entity_1>:
    name: "Theme Background (<entity_1>)"
    max: 255
    icon: mdi:image
  theme_background_<entity_2>:
    name: "Theme Background (<entity_2>)"
    max: 255
    icon: mdi:image

input_number:
  theme_card_opacity_<entity_1>:
    name: "theme_card_opacity_<entity_1>"
    min: -1
    max: 100
    step: 5
    icon: mdi:opacity
    unit_of_measurement: "%"
    mode: slider
  theme_card_opacity_<entity_2>:
    name: "theme_card_opacity_<entity_2>"
    min: -1
    max: 100
    step: 5
    icon: mdi:opacity
    unit_of_measurement: "%"
    mode: slider
  theme_card_blur_<entity_1>:
    name: "theme_card_blur_<entity_1>"
    min: -1
    max: 30
    step: 1
    icon: mdi:blur
    unit_of_measurement: "px"
    mode: slider
  theme_card_blur_<entity_2>:
    name: "theme_card_blur_<entity_2>"
    min: -1
    max: 30
    step: 1
    icon: mdi:blur
    unit_of_measurement: "px"
    mode: slider

# --- REST sensors ---

rest:
  - resource: !secret openmeteo_uv_url
    scan_interval: 86400
    sensor:
      - name: "OpenMeteo Hourly UV Forecast"
        unique_id: openmeteo_hourly_uv_forecast
        value_template: "{{ value_json.hourly.uv_index | max | round(1) }}"
        unit_of_measurement: "UV index"
        icon: mdi:sun-wireless
        json_attributes_path: "$.hourly"
        json_attributes:
          - time
          - uv_index

# --- Command-line sensors ---

command_line:
  - sensor:
      name: theme backgrounds
      command: "python3 /config/scripts/list_theme_backgrounds.py"
      scan_interval: 30
      value_template: "{{ value_json.count | int(0) }}"
      json_attributes:
        - count
        - file_list

# --- Shell commands ---

shell_command:
  generate_theme_thumbnails: "python3 /config/scripts/generate_theme_thumbnails.py"

# --- Automations ---

automation:
  - id: cond_bedtime_doors_on
    alias: "Cond: Bedtime Doors ON"
    trigger:
      - platform: time
        at: "19:30:00"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.cond_bedtime_doors

  - id: cond_bedtime_doors_off
    alias: "Cond: Bedtime Doors OFF"
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.cond_bedtime_doors

  - id: refresh_uv_forecast
    alias: "Refresh UV Forecast"
    trigger:
      - platform: time
        at: "06:55:00"
    action:
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.openmeteo_hourly_uv_forecast
    mode: single

  - id: cond_uv_index_on
    alias: "Cond: UV Index ON"
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.cond_uv_index

  - id: cond_uv_index_off
    alias: "Cond: UV Index OFF"
    trigger:
      - platform: time
        at: "17:00:00"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.cond_uv_index

  - id: theme_generate_background_thumbnails
    alias: "Theme: Generate background thumbnails"
    trigger:
      - platform: state
        entity_id: sensor.theme_backgrounds
    action:
      - service: shell_command.generate_theme_thumbnails
