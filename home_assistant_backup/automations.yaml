- id: '1769879115557'
  alias: 3D Print Complete Notification
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_status
    - sensor.centauri_carbon_2_print_status
    to: complete
    trigger: state
  actions:
  - variables:
      base_name: |
        {{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_print_status', '')
        }}
      notif_title: '{{ base_name | replace(''_'','' '') | title }} Print Done 👍'
      notif_message: |
        Printed: {{ states('input_text.' ~ base_name ~ '_last_file')
            | replace('_',' ')
            | replace('.gcode','')
            | default('Unknown file', true) }}
      notif_image: |
        /api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp() }}
  - data:
      title: '{{ notif_title }}'
      message: '{{ notif_message }}'
      data:
        image: '{{ notif_image }}'
    action: notify.boss_phones
  - target:
      entity_id:
      - input_boolean.{{ base_name }}_half_notified
      - input_boolean.{{ base_name }}_light_on_for_print
    action: input_boolean.turn_off
  mode: parallel
- id: '1769943079478'
  alias: Cache 3D Print Filename
  triggers:
  - entity_id:
    - sensor.centauri_carbon_file_name
    - sensor.centauri_carbon_2_file_name
    trigger: state
  conditions:
  - condition: template
    value_template: |
      {{ trigger.to_state.state
            not in ['unknown', 'Unknown', 'unavailable', 'Unavailable', ''] }}
  actions:
  - target:
      entity_id: |
        input_text.{{ trigger.entity_id
          | replace('sensor.','')
          | replace('_file_name','_last_file') }}
    data:
      value: '{{ trigger.to_state.state }}'
    action: input_text.set_value
  mode: parallel
- id: '1770362666172'
  alias: 3D Print Halfway Notification
  triggers:
  - entity_id:
    - sensor.centauri_carbon_percent_complete
    - sensor.centauri_carbon_2_percent_complete
    above: 49
    below: 57
    trigger: numeric_state
  conditions:
  - condition: template
    value_template: |
      {{ states('input_boolean.' ~ (trigger.entity_id
          | replace('sensor.', '')
          | replace('_percent_complete', '_half_notified')
        )) == 'off' }}
  actions:
  - variables:
      base_name: |
        {{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_percent_complete', '')
        }}
      notif_title: '{{ base_name | replace(''_'','' '') | title }} — Half done printing
        🏗️'
      notif_message: |
        {% set remaining = states('sensor.' ~ base_name ~ '_remaining_print_time') | int(0) %}
        {% set end_time = now() + timedelta(minutes=remaining) %}
        ⏳ End Time: {{ end_time.strftime('%-I:%M %p') }}
      notif_image: |
        /api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp() }}
  - target:
      entity_id: input_boolean.{{ base_name }}_half_notified
    action: input_boolean.turn_on
  - data:
      title: '{{ notif_title }}'
      message: '{{ notif_message }}'
      data:
        image: '{{ notif_image }}'
    action: notify.boss_phones
  mode: single
- id: '1770364950375'
  alias: 3D Print Failure Alert
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_error
    - sensor.centauri_carbon_2_print_error
    - sensor.centauri_carbon_error_status_reason
    - sensor.centauri_carbon_2_error_status_reason
    trigger: state
  conditions:
  - condition: template
    value_template: |
      {{ trigger.to_state.state not in ['none', 'ok', 'unknown', 'unavailable'] }}
  actions:
  - variables:
      base_name: |
        {{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_print_error', '')
          | replace('_error_status_reason', '') }}
      notif_title: '{{ base_name | replace(''_'', '' '') | title }} — Print Error
        ❌'
      notif_message: |
        File: {{ states('input_text.' ~ base_name ~ '_last_file')
            | replace('_',' ')
            | replace('.gcode','')
            | default('Unknown file', true) }}
        🚨 Error: {{ trigger.to_state.state | replace('_',' ') | title }}
      notif_image: |
        /api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp() }}
  - data:
      title: '{{ notif_title }}'
      message: '{{ notif_message }}'
      data:
        image: '{{ notif_image }}'
    action: notify.boss_phones
  - target:
      entity_id:
      - input_boolean.{{ base_name }}_half_notified
      - input_boolean.{{ base_name }}_light_on_for_print
    action: input_boolean.turn_off
  mode: parallel
- id: '1770365431207'
  alias: 3D Printer Light On, On Start
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_status
    - sensor.centauri_carbon_2_print_status
    to: printing
    trigger: state
  conditions:
  - condition: template
    value_template: |
      {% set base_name = trigger.entity_id
          | replace('sensor.', '')
          | replace('_print_status', '') %}
      {{ states('input_boolean.' ~ base_name ~ '_light_on_for_print') == 'off' }}
  actions:
  - target:
      entity_id: |
        light.{{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_print_status', '_chamber_light') }}
    action: light.turn_on
  - target:
      entity_id: |
        input_boolean.{{ trigger.entity_id
          | replace('sensor.', '')
          | replace('_print_status', '_light_on_for_print') }}
    action: input_boolean.turn_on
  mode: single
- id: '1774417251044'
  alias: CC1 Spoolman Update
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_status
    to: complete
    trigger: state
  conditions: []
  actions:
  - variables:
      filename: |
        {{ states('input_text.centauri_carbon_last_file') | replace('.gcode', '') }}
      parts: '{{ filename.split(''_'') }}'
      weight_grams: '{{ parts[-1] | replace(''g'', '''') | float(0) }}'
      filament_name: '{{ parts[-2] | default('''') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: |
          {{ weight_grams > 0
             and filament_name != ''
             and '-' in filament_name }}
      sequence:
      - action: script.update_spoolman_from_filament_name
        data:
          filament_name: '{{ filament_name }}'
          use_weight: '{{ weight_grams | float | round(2) }}'
    default:
    - action: persistent_notification.create
      data:
        title: 'Spoolman: CC1 filename parse failed'
        message: |
          Could not parse filament name and weight from filename "{{ states('input_text.centauri_carbon_last_file') }}". Expected format: [model]_[FilamentName-With-Hyphens]_[weight]g.gcode
  mode: single
- id: '1774710338472'
  alias: CC2 Spoolman Update
  description: ''
  triggers:
  - entity_id:
    - sensor.centauri_carbon_2_print_status
    to: complete
    trigger: state
  conditions: []
  actions:
  - variables:
      raw_data: '{{ states(''input_text.centauri_carbon_2_cached_slot_data'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: |
          {{ raw_data not in ['unknown', 'unavailable', '', 'None'] }}
      sequence:
      - variables:
          slot_data: '{{ raw_data if raw_data is mapping else raw_data | from_json
            }}'
      - repeat:
          for_each:
          - a1
          - a2
          - a3
          - a4
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: |
                  {% set slot = slot_data[repeat.item] %} {{ slot.grams | float(0) > 0
                     and slot.name not in ['', none, 'None'] }}
              sequence:
              - action: script.update_spoolman_from_filament_name
                data:
                  filament_name: '{{ slot_data[repeat.item].name }}'
                  use_weight: '{{ slot_data[repeat.item].grams | float | round(2)
                    }}'
    default:
    - action: persistent_notification.create
      data:
        title: 'Spoolman: CC2 no cached slot data'
        message: |
          CC2 print completed but no cached slot data was found. Filament usage was not tracked. Make sure the gcode capture proxy is configured and the "Cache CC2 Slot Data" automation is enabled.
  mode: single
- id: '1774740101980'
  alias: Cache CC2 Slot Data
  description: ''
  triggers:
  - entity_id:
    - sensor.centauri_carbon_2_a1_grams
    trigger: state
  conditions:
  - condition: template
    value_template: |
      {{ trigger.to_state.state not in ['unknown', 'unavailable'] }}
  actions:
  - action: input_text.set_value
    target:
      entity_id: input_text.centauri_carbon_2_cached_slot_data
    data:
      value: |
        {% set n1 = states('sensor.centauri_carbon_2_a1_name') %} {% set n2 = states('sensor.centauri_carbon_2_a2_name') %} {% set n3 = states('sensor.centauri_carbon_2_a3_name') %} {% set n4 = states('sensor.centauri_carbon_2_a4_name') %} {{ {
          'a1': {'name': '' if n1 in ['unknown','unavailable'] else n1,
                 'grams': states('sensor.centauri_carbon_2_a1_grams') | float(0) | round(2)},
          'a2': {'name': '' if n2 in ['unknown','unavailable'] else n2,
                 'grams': states('sensor.centauri_carbon_2_a2_grams') | float(0) | round(2)},
          'a3': {'name': '' if n3 in ['unknown','unavailable'] else n3,
                 'grams': states('sensor.centauri_carbon_2_a3_grams') | float(0) | round(2)},
          'a4': {'name': '' if n4 in ['unknown','unavailable'] else n4,
                 'grams': states('sensor.centauri_carbon_2_a4_grams') | float(0) | round(2)}
        } | to_json }}
  mode: single
- id: '1776350087907'
  alias: Door Opens After Bedtime
  triggers:
  - entity_id:
    - binary_sensor.<entity_3>s_door_door
    - binary_sensor.<entity_4>s_door_door
    from: 'off'
    to: 'on'
    trigger: state
  conditions:
  - condition: time
    after: '19:45:00'
    before: '23:59:00'
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  actions:
  - variables:
      all_doors:
      - binary_sensor.<entity_3>s_door_door
      - binary_sensor.<entity_4>s_door_door
      base_name: |
        {{ trigger.entity_id
          | replace('binary_sensor.', '')
          | replace('s_door_door', '') }}
      display_name: '{{ base_name | replace(''_'','' '') | title }}'
      door_colors:
        <entity_3>:
          rgb:
          - 255
          - 0
          - 0
          brightness_pct: 15
        <entity_4>:
          rgb:
          - 128
          - 0
          - 128
          brightness_pct: 15
      lifx_rgb: '{{ door_colors[base_name].rgb }}'
      lifx_brightness_pct: '{{ door_colors[base_name].brightness_pct }}'
      notif_message: '{{ now().strftime(''%-I:%M %p'') }} {{ display_name }} 🏃🚪👀'
  - choose:
    - conditions:
      - condition: template
        value_template: |
          {% set others = all_doors | reject('equalto', trigger.entity_id) | list %} {% set others_open = others | map('states') | select('equalto', 'on') | list | length %} {% set scene_ent = states.scene.house_state_pre_door_disruption %} {% set scene_age = (as_timestamp(now()) - as_timestamp(scene_ent.last_changed))
             if scene_ent is not none else 999 %}
          {{ others_open == 0 and scene_age > 3 }}
      sequence:
      - action: scene.create
        data:
          scene_id: house_state_pre_door_disruption
          snapshot_entities:
          - light.kitchen_table_light
          - light.<entity_1>s_lamp
          - light.<entity_2>s_lamp
          - light.<entity_11>_ceiling_light
  - parallel:
    - type: turn_off
      device_id: 165...267
      entity_id: 741...55f
      domain: remote
    - action: media_player.turn_off
      target:
        device_id: 06f...bfc
    - action: lifx.set_state
      data:
        power: true
        rgb_color: '{{ lifx_rgb }}'
        brightness_pct: '{{ lifx_brightness_pct }}'
      target:
        device_id:
        - dfd...50b
        - 921...86f
        - 83e...943
        - d9e...17d
    - data:
        message: '{{ notif_message }}'
      action: notify.boss_phones
  mode: parallel
- id: '1776350252493'
  alias: Door Closes After Bedtime
  triggers:
  - entity_id:
    - binary_sensor.<entity_3>s_door_door
    - binary_sensor.<entity_4>s_door_door
    from: 'on'
    to: 'off'
    trigger: state
  conditions:
  - condition: time
    after: '19:45:00'
    before: '23:59:00'
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  actions:
  - variables:
      all_doors:
      - binary_sensor.<entity_3>s_door_door
      - binary_sensor.<entity_4>s_door_door
      base_name: |
        {{ trigger.entity_id
          | replace('binary_sensor.', '')
          | replace('_door_door', '')
          | regex_replace(find='s$', replace='') }}
      display_name: '{{ base_name | replace(''_'','' '') | title }}'
      door_colors:
        <entity_3>:
          rgb:
          - 255
          - 0
          - 0
          brightness_pct: 15
        <entity_4>:
          rgb:
          - 128
          - 0
          - 128
          brightness_pct: 15
      notif_message: '{{ now().strftime(''%-I:%M %p'') }} {{ display_name }} 🚪🔒'
  - data:
      message: '{{ notif_message }}'
    action: notify.boss_phones
  - choose:
    - conditions:
      - condition: template
        value_template: |
          {% set open = all_doors | map('states') | select('equalto', 'on') | list | length %} {{ open == 0 }}
      sequence:
      - variables:
          tracked_lights:
          - light.kitchen_table_light
          - light.<entity_1>s_lamp
          - light.<entity_2>s_lamp
          - light.<entity_11>_ceiling_light
      - action: scene.turn_on
        target:
          entity_id: scene.house_state_pre_door_disruption
        data:
          transition: 0
      - action: lifx.set_state
        target:
          entity_id: |
            {{ tracked_lights | select('is_state', 'off') | list }}
        data:
          power: false
          color_temp_kelvin: 4000
          brightness: 128
          transition: 0
    default:
    - variables:
        remaining_base: |
          {% set open_doors = all_doors | select('is_state', 'on') | list %} {{ open_doors | first
             | replace('binary_sensor.', '')
             | replace('s_door_door', '') }}
        remaining_rgb: '{{ door_colors[remaining_base].rgb }}'
        remaining_brightness: '{{ door_colors[remaining_base].brightness_pct }}'
    - action: lifx.set_state
      data:
        power: true
        rgb_color: '{{ remaining_rgb }}'
        brightness_pct: '{{ remaining_brightness }}'
      target:
        device_id:
        - dfd...50b
        - 921...86f
        - 83e...943
        - d9e...17d
  mode: parallel
