- id: '1769879115557'
  alias: 3D Print Complete Notification
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_status
    - sensor.centauri_carbon_2_print_status
    to: complete
    trigger: state
  actions:
  - variables:
      base_name: '{{ trigger.entity_id | replace(''sensor.'','''') | replace(''_print_status'','''')
        }}'
      notif_title: "{{ base_name | replace('_',' ') | title }} Print Done \U0001F44D"
      notif_message: 'Printed: {{ states(''input_text.'' ~ base_name ~ ''_last_file'')
        | replace(''_'','' '') | replace(''.gcode'','''') | default(''Unknown file'',
        true) }}

        '
      notif_image: '/api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp()
        }}

        '
  - data:
      title: '{{ notif_title }}'
      message: '{{ notif_message }}'
      data:
        image: '{{ notif_image }}'
    action: notify.boss_phones
  mode: parallel
- id: '1769943079478'
  alias: Cache 3D Print Filename
  triggers:
  - entity_id:
    - sensor.centauri_carbon_file_name
    - sensor.centauri_carbon_2_file_name
    trigger: state
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state.state\n      not in ['unknown', 'Unknown',
      'unavailable', 'Unavailable', ''] }}\n"
  actions:
  - target:
      entity_id: "input_text.{{ trigger.entity_id\n  | replace('sensor.','')\n  |
        replace('_file_name','_last_file') }}\n"
    data:
      value: '{{ trigger.to_state.state }}'
    action: input_text.set_value
  mode: parallel
- id: '1770361925224'
  alias: 3D Print Reset Halfway Flag
  description: ''
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_status
    - sensor.centauri_carbon_2_print_status
    to: printing
    trigger: state
  actions:
  - target:
      entity_id: "input_boolean.{{ trigger.entity_id\n  | replace('sensor.','')\n
        \ | replace('_print_status','_half_notified') }}\n"
    action: input_boolean.turn_off
  mode: parallel
- id: '1770362666172'
  alias: 3D Print Halfway Notification
  triggers:
  - entity_id:
    - sensor.centauri_carbon_percent_complete
    - sensor.centauri_carbon_2_percent_complete
    above: 49
    below: 57
    trigger: numeric_state
  conditions:
  - condition: template
    value_template: '{{ states(''input_boolean.'' ~ (trigger.entity_id | replace(''sensor.'','''')
      | replace(''_percent_complete'',''_half_notified''))) == ''off'' }}

      '
  actions:
  - variables:
      base_name: '{{ trigger.entity_id | replace(''sensor.'','''') | replace(''_percent_complete'','''')
        }}'
      notif_title: "{{ base_name | replace('_',' ') | title }} — Half done printing!
        \U0001F553"
      notif_message: 'File: {{ states(''input_text.'' ~ base_name ~ ''_last_file'')
        | replace(''_'','' '') | replace(''.gcode'','''') | default(''Unknown file'',
        true) }}

        ⏳ Time remaining: {{ (states(''sensor.'' ~ base_name ~ ''_remaining_print_time''))
        | int // 60 }} hours {{ (states(''sensor.'' ~ base_name ~ ''_remaining_print_time''))
        | int % 60 }} minutes

        '
      notif_image: '/api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp()
        }}

        '
  - target:
      entity_id: input_boolean.{{ base_name }}_half_notified
    action: input_boolean.turn_on
  - data:
      title: '{{ notif_title }}'
      message: '{{ notif_message }}'
      data:
        image: '{{ notif_image }}'
    action: notify.boss_phones
  mode: parallel
- id: '1770364950375'
  alias: 3D Print Failure Alert
  triggers:
  - entity_id:
    - sensor.centauri_carbon_print_error
    - sensor.centauri_carbon_2_print_error
    - sensor.centauri_carbon_error_status_reason
    - sensor.centauri_carbon_2_error_status_reason
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.state not in [''none'', ''ok'', ''unknown'',
      ''unavailable''] }}

      '
  actions:
  - variables:
      base_name: "{{ trigger.entity_id \n   | replace('sensor.', '') \n   | replace('_print_error',
        '') \n   | replace('_error_status_reason', '') }}\n"
      notif_title: '{{ base_name | replace(''_'', '' '') | title }} — Print Error
        ❌'
      notif_message: "File: {{ states('input_text.' ~ base_name ~ '_last_file') |
        replace('_',' ') | replace('.gcode','') | default('Unknown file', true) }}\n\U0001F6A8
        Error: {{ trigger.to_state.state | replace('_',' ') | title }}\n"
      notif_image: '/api/image_proxy/image.{{ base_name }}_cover_image?ts={{ now().timestamp()
        }}

        '
  - data:
      title: '{{ notif_title }}'
      message: '{{ notif_message }}'
      data:
        image: '{{ notif_image }}'
    action: notify.boss_phones
  - target:
      entity_id: input_boolean.{{ base_name }}_half_notified
    action: input_boolean.turn_off
  mode: parallel
- id: '1770365431207'
  alias: 3D Printer Light On, On Start
  description: ''
  triggers:
  - entity_id:
