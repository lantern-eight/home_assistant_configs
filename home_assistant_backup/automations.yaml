- id: '1743804334500'
  alias: <entity_3>'s Door Opens After Bedtime
  description: ''
  triggers:
  - alias: <entity_3>'s door opens
    type: opened
    device_id: e0f...001
    entity_id: 649...abc
    domain: binary_sensor
    trigger: device
  conditions:
  - condition: time
    after: '19:45:00'
    before: '23:59:00'
    weekday:
    - sat
    - fri
    - thu
    - wed
    - tue
    - mon
    - sun
  actions:
  - parallel:
    - type: turn_off
      device_id: 165...267
      entity_id: 741...55f
      domain: remote
    - action: lifx.set_state
      metadata: {}
      data:
        power: true
        rgb_color:
        - 255
        - 0
        - 0
        brightness_pct: 15
      target:
        device_id:
        - dfd...50b
        - 921...86f
        - 83e...943
    - action: media_player.turn_off
      target:
        device_id: 06f...bfc
      data: {}
    - action: notify.mobile_app_<entity_7>
      metadata: {}
      data:
        message: "\U0001F3C3\U0001F6AA\U0001F440"
      alias: Notify <entity_6>
    - action: notify.mobile_app_<entity_9>
      metadata: {}
      data:
        message: "\U0001F3C3\U0001F6AA\U0001F440"
      alias: Notify <entity_8>
  mode: single
