- binary_sensor:
  - name: "Take Trash Out To Curb"
    state: >
      {{
        now().weekday() == 3 and 
        now().hour >= 17 and 
        now().hour < 23
      }}


# This sensor counts active notifications. What counts as an 'active notification', is
# determined by what is defined here.
- sensor:
  - name: "Active Notification Count"
    state: >

      {% set count = 0 %}

      {#
        - Check if there are wind gusts over 10 mph from the backyard weather station.
        - states() retrieves the state of the entity
        - '| float(9999)' is a filter that converts the state to a float and sets the
          default to 9999 if the state unavailable or non-numeric.
        - '> 10' checks if the state is greater than 10
      #}
      {% if states('sensor.<entity_10>_wind_gust') | float(9999) > 10 %}
        {% set count = count + 1 %}
      {% endif %}

      {# Check if feels like temperature is above 100°F. #}
      {% if states('sensor.<entity_10>_feels_like') | float(9999) > 100 %}
        {% set count = count + 1 %}
      {% endif %}

      {# Check if UV index is above 8 (very high/extreme exposure). #}
      {% if states('sensor.<entity_10>_uv_index') | float(9999) > 8 %}
        {% set count = count + 1 %}
      {% endif %}

      {# Check if the trash needs to be taken out to the curb. #}
      {% if is_state('binary_sensor.take_trash_out_to_curb', 'on') %}
        {% set count = count + 1 %}
      {% endif %}

      {# Check if <entity_3>s door is open between 7:30 PM and 6 AM. #}
      {# 'on' = door is open, in Home Assistant it will show 'open' as a friendly
      name based on the device class.#}
      {% if is_state('binary_sensor.<entity_3>s_door_door', 'on') %}

        {% set current_hour = now().hour %}
        {% set current_minute = now().minute %}

        {# Time is between 7:30 PM (19:30) and 6 AM (06:00) #}
        {% if (current_hour > 19) or (current_hour == 19 and current_minute >= 30) or (current_hour < 6) %}
          {% set count = count + 1 %}
        {% endif %}
      {% endif %}

      {# Check if office CO2 levels are above 1500 ppm. #}
      {% if states('sensor.office_carbon_dioxide') | float(9999) > 1500 %}
        {% set count = count + 1 %}
      {% endif %}

      {{ count }}
