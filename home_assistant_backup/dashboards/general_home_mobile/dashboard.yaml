              action: expand
            card_mod:
              style: |
                ha-card {
                  overflow: hidden;
                  border: none !important;
                  box-shadow: none !important;
                  --ha-card-border-width: 0 !important;
                  background: var(--card-background-color) !important;
                }
                .header-container {
                  background: rgba(var(--rgb-primary-text-color), 0.05);
                  margin: 0 -16px;
                  padding: 0 16px;
                }

