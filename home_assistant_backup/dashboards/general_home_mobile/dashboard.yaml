# =============================================================================
# General Home Mobile Dashboard
# =============================================================================
# Phone-first dashboard for all household members.
# Uses Material You theme (auto light/dark from system).
# Kiosk mode: configure via kiosk-mode HACS integration for URL
#   /general-home/*. Escape via More > Home Assistant.
#
# HACS cards: weather-forecast-card, calendar-card-pro, bubble-card,
#   mushroom, apexcharts-card, card-mod, stack-in-card, mini-graph-card,
#   material-you-utilities, kiosk-mode, auto-entities
#
# HA helpers:
#   - input_boolean.cond_bedtime_doors
#   - input_boolean.cond_uv_index
#
# Template sensors: general_home_mobile/sensors.yaml
# REST sensor:      general_home_mobile/rest_sensors.yaml
# HA config:        general_home_mobile/ha_config_additions.yaml
# Sync:             uv run python scripts/general_home_dashboard_sync.py [-r]
# =============================================================================

kiosk_mode:
  hide_header: true
  hide_sidebar: true

views:
  # ===========================================================================
  # HOME — Main view
  # ===========================================================================
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 1
    card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          --ha-card-border-width: 0 !important;
        }
    sections:
      # -----------------------------------------------------------------------
      # Header — Weather
      # -----------------------------------------------------------------------
      - type: grid
        column_span: 1
        cards:
          - type: custom:stack-in-card
            mode: vertical
            card_mod:
              style:
                .: |
                  ha-card {
                    border: none !important;
                    box-shadow: none !important;
                    --ha-card-border-width: 0 !important;
                    overflow: hidden !important;
                    background: var(--card-background-color) !important;
                  }
                hui-vertical-stack-card$: |
                  #root > * {
                    margin: 0 !important;
                    --ha-card-border-width: 0 !important;
                  }
            cards:
              - type: custom:weather-forecast-card
                entity: weather.forecast_home
                name: Home
                default_forecast: hourly
                current:
                  temperature_entity: sensor.<entity_10>_temperature
                  temperature_precision: 0
                  show_attributes:
                    - name: apparent_temperature
                      entity: sensor.<entity_10>_feels_like
                forecast:
                  mode: chart
                  extra_attribute: wind_bearing
                  hourly_group_size: 2
                card_mod:
                  style: |
                    .wfc-current-secondary-info {
                      display: none !important;
                    }
                    .wfc-current-attribute:nth-child(1) .wfc-current-attribute-name {
                      font-size: 0;
                    }
                    .wfc-current-attribute:nth-child(1) .wfc-current-attribute-name::after {
                      content: "Feels Like";
                      font-size: var(--ha-font-size-m, 14px);
                    }
                    ha-card {
                      border: none !important;
                      border-bottom: none !important;
                      box-shadow: none !important;
                      padding-bottom: 0 !important;
                      background: transparent !important;
                    }
                    .wfc-current-weather {
                      background: rgba(var(--rgb-primary-text-color), 0.05);
                      margin: -16px -16px 0;
                      padding: 12px 16px 4px;
                    }
              - type: custom:apexcharts-card
                header:
                  show: true
                  title: Absolute humidity
                  show_states: true
                graph_span: 24h
                span:
                  end: hour
                yaxis:
                  - min: 0
                    max: 20
                    decimals: 0
                    apex_config:
                      tickAmount: 4
                apex_config:
                  chart:
                    height: 130
                  stroke:
                    curve: smooth
                    width: 2
                  fill:
                    type: gradient
                    gradient:
                      opacityFrom: 0.45
                      opacityTo: 0.05
                  grid:
                    show: true
                    borderColor: rgba(128, 128, 128, 0.2)
                  legend:
                    show: false
                  xaxis:
                    type: datetime
                    tickAmount: 5
                    labels:
                      showDuplicates: false
                      formatter: |
                        EVAL:function(val, timestamp, opts) {
                          const i = opts.i;
                          const n = opts.w.globals.labels.length;
                          const step = Math.max(1, Math.round((n - 1) / 5));
                          if (i % step !== 0 && i !== n - 1) return '';
                          return new Date(val).toLocaleTimeString('en-US', {
                            hour: 'numeric',
                            hour12: true,
                          });
                        }
                  yaxis:
                    labels:
                      show: true
                series:
                  - entity: sensor.backyard_absolute_humidity
                    name: Absolute humidity
                    type: area
                    show:
                      name_in_header: false
                    group_by:
                      func: avg
                      duration: 1h
                card_mod:
                  style: |
                    ha-card {
                      box-shadow: none !important;
                      border: none !important;
                      margin-top: -8px;
                      padding-top: 0 !important;
                      background: transparent !important;
                    }
                    .apexcharts-xaxis text {
                      font-size: 10px !important;
                    }

      # -----------------------------------------------------------------------
      # Conditional Cards — priority-managed, max 5 shown
      # -----------------------------------------------------------------------
      # Each card wraps in a conditional that checks the priority template
      # sensor. Cards appear/disappear based on time and context.
      - type: grid
        column_span: 1
        cards:
          # --- Bedtime Door Monitor (7:30 PM – 7:00 AM) ---
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.dashboard_conditional_visible
                state_not: "0"
              - condition: state
                entity: input_boolean.cond_bedtime_doors
                state: "on"
            card:
              type: custom:stack-in-card
              mode: vertical
              card_mod:
                style:
                  .: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                      --ha-card-border-width: 0 !important;
                      overflow: hidden !important;
                      background: var(--card-background-color) !important;
                    }
                  hui-vertical-stack-card$: |
                    #root > * {
                      margin: 0 !important;
                      --ha-card-border-width: 0 !important;
                    }
              cards:
                - type: custom:mushroom-title-card
                  title: "Bedtime Doors"
                  subtitle: "Monitoring active"
                  icon: mdi:door-open
                  card_mod:
                    style: |
                      ha-card {
                        --card-primary-font-size: 16px;
                        --card-secondary-font-size: 12px;
                        padding-bottom: 0 !important;
                        background: rgba(var(--rgb-primary-text-color), 0.05) !important;
                        border: none !important;
                        box-shadow: none !important;
                      }
                - type: entities
                  entities:
                    - entity: binary_sensor.<entity_3>s_door_door
                      name: "<entity_3>'s Door"
                      icon: mdi:door
                      secondary_info: last-changed
                    - entity: binary_sensor.<entity_4>s_door_door
                      name: "<entity_4>'s Door"
                      icon: mdi:door
                      secondary_info: last-changed
                  card_mod:
                    style: |
                      ha-card {
                        border-top: none !important;
                        box-shadow: none !important;
                        padding-top: 0;
                        background: transparent !important;
                      }

          # --- UV Index Chart (7:00 AM – 5:00 PM) ---
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.cond_uv_index
                state: "on"
            card:
              type: custom:apexcharts-card
              header:
                title: "UV Index Today"
                show: true
                show_states: true
                colorize_states: true
              graph_span: 12h
              span:
                start: day
                offset: "+7h"
              now:
                show: true
              yaxis:
                - min: 0
                  max: ~12
                  apex_config:
                    tickAmount: 4
              apex_config:
                chart:
                  height: 180
                stroke:
                  opacity: 1
                fill:
                  opacity: [0, 0.7]
                annotations:
                  yaxis:
                    - y: 0
                      y2: 3
                      fillColor: "#4CAF50"
                      opacity: 0.1
                      label:
                        text: "Low"
                        borderWidth: 0
                        style:
                          fontSize: "10px"
                          background: transparent
                          color: "#9E9E9E"
                          padding:
                            left: 0
                            right: 0
                            top: 0
                            bottom: 0
                    - y: 3
                      y2: 6
                      fillColor: "#FFC107"
                      opacity: 0.1
                      label:
                        text: "Moderate"
                        borderWidth: 0
                        style:
                          fontSize: "10px"
                          background: transparent
                          color: "#9E9E9E"
                          padding:
                            left: 0
                            right: 0
                            top: 0
                            bottom: 0
                    - y: 6
                      y2: 8
                      fillColor: "#FF9800"
                      opacity: 0.1
                      label:
                        text: "High"
                        borderWidth: 0
                        style:
                          fontSize: "10px"
                          background: transparent
                          color: "#9E9E9E"
                          padding:
                            left: 0
                            right: 0
                            top: 0
                            bottom: 0
                    - y: 8
                      y2: 15
                      fillColor: "#F44336"
                      opacity: 0.1
                      label:
                        text: "Very High"
                        borderWidth: 0
                        style:
                          fontSize: "10px"
                          background: transparent
                          color: "#9E9E9E"
                          padding:
                            left: 0
                            right: 0
                            top: 0
                            bottom: 0
              series:
                - entity: sensor.openmeteo_hourly_uv_forecast
                  name: "Forecast"
                  type: area
                  color: "#03A9F4"
                  opacity: 0
                  stroke_width: 2
                  stroke_dash: 6
                  show:
                    in_header: raw
                  data_generator: |
                    return entity.attributes.time
                      .map((t, i) => [new Date(t).getTime(), entity.attributes.uv_index[i]])
                      .filter((p) => p[0] >= start.getTime() && p[0] <= end.getTime());
                - entity: sensor.<entity_10>_uv_index
                  name: "Measured"
                  type: area
                  color: "#FF9800"
                  stroke_width: 2
                  extend_to: now
                  group_by:
                    func: avg
                    duration: 30min
              card_mod:
                style: |
                  ha-card {
                    border: none !important;
                    box-shadow: none !important;
                    --ha-card-border-width: 0 !important;
                    overflow: hidden !important;
                    background: var(--card-background-color) !important;
                  }
                  #header {
                    background: rgba(var(--rgb-primary-text-color), 0.05);
                    padding: 10px 20px 6px !important;
                  }
                  #header__states {
                    display: grid !important;
                    grid-template-columns: 1fr 1fr !important;
                    gap: 24px !important;
                    margin: 0 !important;
                    padding: 0 4px !important;
                  }
                  #states__state {
                    flex: unset !important;
                    min-width: 0 !important;
                    max-width: none !important;
                  }
                  #state__name {
                    overflow: visible !important;
                    text-overflow: unset !important;
                    white-space: normal !important;
                  }
                  #uom {
                    display: none !important;
                  }

      # -----------------------------------------------------------------------
      # Indoor Climate — <entity_17> + Airthings
      # -----------------------------------------------------------------------
      - type: grid
        column_span: 1
        cards:
          - type: custom:stack-in-card
            mode: vertical
            card_mod:
              style:
                .: |
                  ha-card {
                    border: none !important;
                    box-shadow: none !important;
                    --ha-card-border-width: 0 !important;
                    overflow: hidden !important;
                    background: var(--card-background-color) !important;
                  }
                hui-vertical-stack-card$: |
                  #root > * {
                    margin: 0 !important;
                    --ha-card-border-width: 0 !important;
                  }
            cards:
              # Thermostat headline
              - type: custom:mushroom-climate-card
                entity: climate.living_room_thermostat
                name: "Climate"
                icon_type: none
                show_temperature_control: false
                collapsible_controls: false
                tap_action:
                  action: navigate
                  navigation_path: /general-home/climate
                card_mod:
                  style: |
                    ha-card {
                      padding-bottom: 4px !important;
                      background: rgba(var(--rgb-primary-text-color), 0.05) !important;
                      border: none !important;
                      box-shadow: none !important;
                    }

              # Current indoor temperature (<entity_17> reading used for HVAC)
              - type: custom:button-card
                entity: sensor.living_room_thermostat_current_temperature
                show_icon: false
                show_name: false
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /general-home/climate
                custom_fields:
                  temp: |
                    [[[
                      const val = parseFloat(entity.state);
                      const n = Number.isFinite(val) ? Math.round(val) : '--';
                      return `<div style="font-size:52px;font-weight:300;line-height:1;letter-spacing:-1px;">${n}<span style="font-size:28px;vertical-align:super;">°</span></div>`;
                    ]]]
                styles:
                  card:
                    - background: none
                    - box-shadow: none
                    - border: none
                    - padding: 0 16px 8px
                  grid:
                    - grid-template-areas: '"temp"'
                    - grid-template-columns: 1fr
                    - justify-items: center
                  custom_fields:
                    temp:
                      - text-align: center
                card_mod:
                  style: |
                    ha-card {
                      box-shadow: none !important;
                      border: none !important;
                      margin-top: -4px;
                      background: transparent !important;
                    }

              # Air quality metrics row (5-dot severity indicator)
              - type: horizontal-stack
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                      background: transparent !important;
                    }
                cards:
                  - type: custom:button-card
                    entity: sensor.basement_humidity
                    name: Humidity
                    show_state: false
                    show_icon: false
                    show_name: true
                    tap_action:
                      action: more-info
                    custom_fields:
                      dots: |
                        [[[
                          const val = parseFloat(entity.state);
                          let level = 0;
                          if (val < 60 && val > 30) level = 1;
                          else if (val <= 30 || val >= 60) level = 2;
                          if (val < 25 || val > 65) level = 3;
                          if (val < 20 || val > 70) level = 4;
                          if (val < 15 || val > 80) level = 5;
                          const colors = ['#4CAF50','#8BC34A','#FFC107','#FF9800','#FF5722'];
                          const d = (i) => `<div style="width:7px;height:7px;border-radius:50%;background:${i < level ? colors[i] : '#555'}"></div>`;
                          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${d(4)}${d(3)}${d(2)}${d(1)}${d(0)}</div>`;
                        ]]]
                      value: |
                        [[[
                          return `<span style="font-size:14px;font-weight:bold;">${parseFloat(entity.state).toFixed(0)}</span>`;
                        ]]]
                      unit: |
                        [[[
                          return `<span style="font-size:10px;color:var(--secondary-text-color);">%</span>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                        - padding: 8px 2px
                      name:
                        - font-size: 11px
                        - color: var(--secondary-text-color)
                      grid:
                        - grid-template-areas: '"dots" "n" "value" "unit"'
                        - grid-template-rows: min-content min-content min-content min-content
                      custom_fields:
                        dots:
                          - margin-bottom: 6px
                        value:
                          - margin-top: 2px
                        unit:
                          - margin-top: 0px
                  - type: custom:button-card
                    entity: sensor.basement_carbon_dioxide
                    name: CO₂
                    show_state: false
                    show_icon: false
                    show_name: true
                    tap_action:
                      action: more-info
                    custom_fields:
                      dots: |
                        [[[
                          const val = parseFloat(entity.state);
                          let level = 0;
                          if (val > 400) level = 1;
                          if (val > 600) level = 2;
                          if (val > 800) level = 3;
                          if (val > 1000) level = 4;
                          if (val > 1500) level = 5;
                          const colors = ['#4CAF50','#8BC34A','#FFC107','#FF9800','#FF5722'];
                          const d = (i) => `<div style="width:7px;height:7px;border-radius:50%;background:${i < level ? colors[i] : '#555'}"></div>`;
                          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${d(4)}${d(3)}${d(2)}${d(1)}${d(0)}</div>`;
                        ]]]
                      value: |
                        [[[
                          return `<span style="font-size:14px;font-weight:bold;">${parseFloat(entity.state).toFixed(1)}</span>`;
                        ]]]
                      unit: |
                        [[[
                          return `<span style="font-size:10px;color:var(--secondary-text-color);">ppm</span>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                        - padding: 8px 2px
                      name:
                        - font-size: 11px
                        - color: var(--secondary-text-color)
                      grid:
                        - grid-template-areas: '"dots" "n" "value" "unit"'
                        - grid-template-rows: min-content min-content min-content min-content
                      custom_fields:
                        dots:
                          - margin-bottom: 6px
                        value:
                          - margin-top: 2px
                        unit:
                          - margin-top: 0px
                  - type: custom:button-card
                    entity: sensor.basement_volatile_organic_compounds_parts
                    name: Chemicals
                    show_state: false
                    show_icon: false
                    show_name: true
                    tap_action:
                      action: more-info
                    custom_fields:
                      dots: |
                        [[[
                          const val = parseFloat(entity.state);
                          let level = 0;
                          if (val > 65) level = 1;
                          if (val > 150) level = 2;
                          if (val > 250) level = 3;
                          if (val > 500) level = 4;
                          if (val > 1000) level = 5;
                          const colors = ['#4CAF50','#8BC34A','#FFC107','#FF9800','#FF5722'];
                          const d = (i) => `<div style="width:7px;height:7px;border-radius:50%;background:${i < level ? colors[i] : '#555'}"></div>`;
                          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${d(4)}${d(3)}${d(2)}${d(1)}${d(0)}</div>`;
                        ]]]
                      value: |
                        [[[
                          return `<span style="font-size:14px;font-weight:bold;">${parseFloat(entity.state).toFixed(1)}</span>`;
                        ]]]
                      unit: |
                        [[[
                          return `<span style="font-size:10px;color:var(--secondary-text-color);">ppb</span>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                        - padding: 8px 2px
                      name:
                        - font-size: 11px
                        - color: var(--secondary-text-color)
                      grid:
                        - grid-template-areas: '"dots" "n" "value" "unit"'
                        - grid-template-rows: min-content min-content min-content min-content
                      custom_fields:
                        dots:
                          - margin-bottom: 6px
                        value:
                          - margin-top: 2px
                        unit:
                          - margin-top: 0px
                  - type: custom:button-card
                    entity: sensor.basement_pm2_5
                    name: PM2.5
                    show_state: false
                    show_icon: false
                    show_name: true
                    tap_action:
                      action: more-info
                    custom_fields:
                      dots: |
                        [[[
                          const val = parseFloat(entity.state);
                          let level = 1;
                          if (val > 12) level = 2;
                          if (val > 25) level = 3;
                          if (val > 35) level = 4;
                          if (val > 55) level = 5;
                          const colors = ['#4CAF50','#8BC34A','#FFC107','#FF9800','#FF5722'];
                          const d = (i) => `<div style="width:7px;height:7px;border-radius:50%;background:${i < level ? colors[i] : '#555'}"></div>`;
                          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${d(4)}${d(3)}${d(2)}${d(1)}${d(0)}</div>`;
                        ]]]
                      value: |
                        [[[
                          return `<span style="font-size:14px;font-weight:bold;">${parseFloat(entity.state).toFixed(1)}</span>`;
                        ]]]
                      unit: |
                        [[[
                          return `<span style="font-size:10px;color:var(--secondary-text-color);">µg/m³</span>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                        - padding: 8px 2px
                      name:
                        - font-size: 11px
                        - color: var(--secondary-text-color)
                      grid:
                        - grid-template-areas: '"dots" "n" "value" "unit"'
                        - grid-template-rows: min-content min-content min-content min-content
                      custom_fields:
                        dots:
                          - margin-bottom: 6px
                        value:
                          - margin-top: 2px
                        unit:
                          - margin-top: 0px
                  - type: custom:button-card
                    entity: sensor.basement_radon
                    name: Radon
                    show_state: false
                    show_icon: false
                    show_name: true
                    tap_action:
                      action: more-info
                    custom_fields:
                      dots: |
                        [[[
                          const val = parseFloat(entity.state);
                          let level = 0;
                          if (val > 0) level = 1;
                          if (val > 50) level = 2;
                          if (val > 100) level = 3;
                          if (val > 150) level = 4;
                          if (val > 200) level = 5;
                          const colors = ['#4CAF50','#8BC34A','#FFC107','#FF9800','#FF5722'];
                          const d = (i) => `<div style="width:7px;height:7px;border-radius:50%;background:${i < level ? colors[i] : '#555'}"></div>`;
                          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${d(4)}${d(3)}${d(2)}${d(1)}${d(0)}</div>`;
                        ]]]
                      value: |
                        [[[
                          return `<span style="font-size:14px;font-weight:bold;">${parseFloat(entity.state).toFixed(0)}</span>`;
                        ]]]
                      unit: |
                        [[[
                          return `<span style="font-size:10px;color:var(--secondary-text-color);">Bq/m³</span>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                        - padding: 8px 2px
                      name:
                        - font-size: 11px
                        - color: var(--secondary-text-color)
                      grid:
                        - grid-template-areas: '"dots" "n" "value" "unit"'
                        - grid-template-rows: min-content min-content min-content min-content
                      custom_fields:
                        dots:
                          - margin-bottom: 6px
                        value:
                          - margin-top: 2px
                        unit:
                          - margin-top: 0px
                  - type: custom:button-card
                    entity: sensor.<entity_13>_air_quality_index
                    name: Outdoor AQI
                    show_state: false
                    show_icon: false
                    show_name: true
                    tap_action:
                      action: more-info
                    custom_fields:
                      dots: |
                        [[[
                          const val = parseFloat(entity.state);
                          let level = 0;
                          if (val > 0) level = 1;
                          if (val > 50) level = 2;
                          if (val > 100) level = 3;
                          if (val > 150) level = 4;
                          if (val > 200) level = 5;
                          const colors = ['#4CAF50','#8BC34A','#FFC107','#FF9800','#FF5722'];
                          const d = (i) => `<div style="width:7px;height:7px;border-radius:50%;background:${i < level ? colors[i] : '#555'}"></div>`;
                          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">${d(4)}${d(3)}${d(2)}${d(1)}${d(0)}</div>`;
                        ]]]
                      value: |
                        [[[
                          return `<span style="font-size:14px;font-weight:bold;">${parseFloat(entity.state).toFixed(0)}</span>`;
                        ]]]
                      unit: |
                        [[[
                          return `<span style="font-size:10px;color:var(--secondary-text-color);">AQI</span>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                        - padding: 8px 2px
                      name:
                        - font-size: 11px
                        - color: var(--secondary-text-color)
                      grid:
                        - grid-template-areas: '"dots" "n" "value" "unit"'
                        - grid-template-rows: min-content min-content min-content min-content
                      custom_fields:
                        dots:
                          - margin-bottom: 6px
                        value:
                          - margin-top: 2px
                        unit:
                          - margin-top: 0px

      # -----------------------------------------------------------------------
      # Calendar
      # -----------------------------------------------------------------------
      - type: grid
        column_span: 1
        cards:
          - type: custom:calendar-card-pro
            entities:
              - entity: calendar.<entity_15>_calendar
                accent_color: '#03a9f4'
              - entity: calendar.unknown
                label: '🔹'
                accent_color: '#2196f3'
              - entity: calendar.birthdays
                label: '🎂'
                accent_color: '#e91e63'
              - entity: calendar.conventions
                label: '🎟️'
                accent_color: '#9c27b0'
              - entity: calendar.<entity_14>_game_nights
                label: '🎲'
                accent_color: '#4caf50'
              - entity: calendar.piano
                label: '🎹'
                accent_color: '#009688'
              - entity: calendar.unknown_2
                accent_color: '#ff5722'
            days_to_show: 7
            compact_days_to_show: 3
            show_empty_days: false
            split_multiday_events: true
            show_past_events: false
            show_time: true
            show_location: true
            show_countdown: true
            show_progress_bar: true
            event_background_opacity: 15
            vertical_line_width: 3px
            today_indicator: true
            weekend_weekday_color: var(--secondary-text-color)
            weekend_day_color: var(--secondary-text-color)
            day_separator_width: 1px
            day_separator_color: var(--divider-color)
            week_separator_width: 2px
            week_separator_color: '#03a9f450'
            month_separator_width: 3px
            month_separator_color: var(--primary-text-color)
