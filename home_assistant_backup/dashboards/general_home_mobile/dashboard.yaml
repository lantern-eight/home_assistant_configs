                icon: mdi:home-outline
                icon_selected: mdi:home
                label: Home
              - icon: mdi:view-grid-outline
                icon_selected: mdi:view-grid
                label: Rooms
                tap_action:
                  action: navigate
                  navigation_path: '#rooms'
              - url: /general-home/climate
                icon: mdi:thermometer-low
                icon_selected: mdi:thermometer
                label: Climate
              - url: /general-home/security
                icon: mdi:shield-lock-outline
