  # ===========================================================================
  # CLIMATE — Sub-view for thermostat controls
  # ===========================================================================
  - title: Climate
    path: climate
    icon: mdi:thermometer
    subview: true
    type: sections
    max_columns: 1
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: thermostat
            entity: climate.living_room_thermostat
            features:
              - type: climate-hvac-modes
                hvac_modes:
                  - heat
                  - cool
                  - heat_cool
                  - "off"
              - type: target-temperature

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.living_room_thermostat_current_temperature
                name: "Indoor"
                color: var(--primary-color)
            hours_to_show: 48
            points_per_hour: 2
            line_width: 2
            show:
              fill: fade
              labels: true
              name: false
              icon: false

          - type: custom:mushroom-entity-card
            entity: sensor.living_room_thermostat_current_humidity
            name: "Indoor Humidity"
            icon: mdi:water-percent

          - type: custom:mushroom-entity-card
            entity: select.living_room_thermostat_current_mode
            name: "<entity_17> Mode"
            icon: mdi:thermostat

  # ===========================================================================
  # SECURITY — Stub view
  # ===========================================================================
  - title: Security
    path: security
    icon: mdi:shield-home
    subview: true
    type: sections
    max_columns: 1
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-title-card
            title: "Security"
            subtitle: "Door and entry monitoring"
          - type: entities
            entities:
              - entity: binary_sensor.<entity_3>s_door_door
                name: "<entity_3>'s Door"
                icon: mdi:door
                secondary_info: last-changed
              - entity: binary_sensor.<entity_4>s_door_door
                name: "<entity_4>'s Door"
                icon: mdi:door
                secondary_info: last-changed

  # ===========================================================================
  # ALL ALERTS — Sub-view listing every conditional card (always visible)
  # ===========================================================================
  - title: All Alerts
    path: all-alerts
    icon: mdi:bell-ring
    subview: true
    type: sections
    max_columns: 1
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-title-card
                title: "Bedtime Doors"
                subtitle: "Monitoring active"
                icon: mdi:door-open
                card_mod:
                  style: |
                    ha-card {
                      --card-primary-font-size: 16px;
                      --card-secondary-font-size: 12px;
                      padding-bottom: 0 !important;
                    }
              - type: entities
                entities:
                  - entity: binary_sensor.<entity_3>s_door_door
                    name: "<entity_3>'s Door"
                    icon: mdi:door
                    secondary_info: last-changed
                  - entity: binary_sensor.<entity_4>s_door_door
                    name: "<entity_4>'s Door"
                    icon: mdi:door
                    secondary_info: last-changed
                card_mod:
                  style: |
                    ha-card {
                      border-top: none !important;
                      box-shadow: none !important;
                      padding-top: 0;
                    }

          - type: custom:apexcharts-card
            header:
              title: "UV Index Today"
              show: true
              show_states: true
              colorize_states: true
            graph_span: 12h
            span:
              start: day
              offset: "+7h"
            now:
              show: true
            yaxis:
              - min: 0
                max: ~12
                apex_config:
                  tickAmount: 4
            apex_config:
              chart:
                height: 180
              stroke:
                opacity: 1
              fill:
                opacity: [0, 0.7]
              annotations:
                yaxis:
                  - y: 0
                    y2: 3
                    fillColor: "#4CAF50"
                    opacity: 0.1
                    label:
                      text: "Low"
                      borderWidth: 0
                      style:
                        fontSize: "10px"
                        background: transparent
                        color: "#9E9E9E"
                        padding:
                          left: 0
                          right: 0
                          top: 0
                          bottom: 0
                  - y: 3
                    y2: 6
                    fillColor: "#FFC107"
                    opacity: 0.1
                    label:
                      text: "Moderate"
                      borderWidth: 0
                      style:
                        fontSize: "10px"
                        background: transparent
                        color: "#9E9E9E"
                        padding:
                          left: 0
                          right: 0
                          top: 0
                          bottom: 0
                  - y: 6
                    y2: 8
                    fillColor: "#FF9800"
                    opacity: 0.1
                    label:
                      text: "High"
                      borderWidth: 0
                      style:
                        fontSize: "10px"
                        background: transparent
                        color: "#9E9E9E"
                        padding:
                          left: 0
                          right: 0
                          top: 0
                          bottom: 0
                  - y: 8
                    y2: 15
                    fillColor: "#F44336"
                    opacity: 0.1
                    label:
                      text: "Very High"
                      borderWidth: 0
                      style:
                        fontSize: "10px"
                        background: transparent
                        color: "#9E9E9E"
                        padding:
                          left: 0
                          right: 0
                          top: 0
                          bottom: 0
            series:
              - entity: sensor.openmeteo_hourly_uv_forecast
                name: "Forecast"
                type: area
                color: "#03A9F4"
                opacity: 0
                stroke_width: 2
                stroke_dash: 6
                show:
                  in_header: raw
                data_generator: |
                  return entity.attributes.time
                    .map((t, i) => [new Date(t).getTime(), entity.attributes.uv_index[i]])
                    .filter((p) => p[0] >= start.getTime() && p[0] <= end.getTime());
              - entity: sensor.<entity_10>_uv_index
                name: "Measured"
                type: area
                color: "#FF9800"
                stroke_width: 2
                extend_to: now
                group_by:
                  func: avg
                  duration: 30min
            card_mod:
              style: |
                #header {
                  padding: 10px 20px 6px !important;
                }
                #header__states {
                  display: grid !important;
                  grid-template-columns: 1fr 1fr !important;
                  gap: 24px !important;
                  margin: 0 !important;
                  padding: 0 4px !important;
                }
                #states__state {
                  flex: unset !important;
                  min-width: 0 !important;
                  max-width: none !important;
                }
                #state__name {
                  overflow: visible !important;
                  text-overflow: unset !important;
                  white-space: normal !important;
                }
                #uom {
                  display: none !important;
                }

  # ===========================================================================
  # AUTOMATIONS — Sub-view listing all automations with enable/disable toggles
  # ===========================================================================
  - title: Automations
    path: automations
    icon: mdi:robot-outline
    subview: true
    type: sections
    max_columns: 1
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-title-card
            title: "Automations"
            subtitle: "Use the switch to enable or disable"
            icon: mdi:robot-outline

          - type: custom:auto-entities
            card:
              type: entities
            sort:
              method: friendly_name
              ignore_case: true
            filter:
              include:
                - domain: automation
            show_empty: false
